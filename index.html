<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap Interface | Zero-Flaw 1:1</title>
    <!-- PRODUCTION DEPENDENCIES -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* OFFICIAL REPOSITORY PALETTE (THEME.TSX) */
        :root {
            --bg-0: #000000; --bg-1: #0D0D0D; --bg-2: #131313; --bg-3: #1B1B1B;
            --pink: #FF007A; --white: #FFFFFF; --gray: #9B9B9B; --border: #222222;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg-0); color: var(--white); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* HEADER: PIXEL-PERFECT ALIGNMENT */
        header { 
            width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid #191919; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .nav-links { display: flex; background: var(--bg-1); padding: 4px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-links div { padding: 6px 14px; border-radius: 12px; cursor: pointer; color: var(--gray); font-weight: 500; font-size: 15px; }
        .nav-links div.active { color: var(--white); background: var(--bg-3); }

        /* PAGE CONTENT */
        .page-container { width: 100%; max-width: 480px; margin-top: 60px; padding: 0 8px; z-index: 1; }
        .hero { font-size: 34px; font-weight: 600; letter-spacing: -1.2px; line-height: 1.1; margin-bottom: 24px; text-align: left; }

        /* SWAP MODULE: COMPONENTS/SWAP/SWAPWIDGET.TSX */
        .swap-card { background: var(--bg-1); border-radius: 24px; padding: 8px; border: 1px solid var(--border); box-shadow: 0 0 100px rgba(255,0,122,0.02); }
        .input-module { background: var(--bg-2); border-radius: 16px; padding: 16px; margin: 4px 0; border: 1px solid transparent; }
        .input-module:hover { border-color: #333; }
        .label { font-size: 14px; color: var(--gray); margin-bottom: 8px; font-weight: 500; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        input { background: none; border: none; color: white; font-size: 36px; width: 55%; outline: none; font-weight: 500; }
        
        .token-pill { 
            background: #000000; border: 1px solid var(--border); padding: 6px 12px; 
            border-radius: 18px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 700; transition: 0.2s;
        }
        .token-pill img { width: 22px; height: 22px; border-radius: 50%; }

        .arrow-box { 
            width: 40px; height: 40px; background: var(--bg-2); border: 4px solid var(--bg-1); 
            border-radius: 12px; margin: -20px auto; display: flex; justify-content: center; 
            align-items: center; position: relative; z-index: 10; cursor: pointer; color: var(--gray);
        }

        .action-btn { 
            width: 100%; background: #1b1b1b; color: var(--white); border: 1px solid var(--border); 
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700; margin-top: 10px; cursor: pointer; 
        }
        .action-btn.active { background: var(--pink); border: none; color: white; }

        /* MODAL PORTAL: PIXEL-PERFECT SEARCH */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--bg-1); width: 100%; max-width: 420px; height: 80vh; max-height: 600px; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; font-weight: 600; font-size: 16px; }
        .search-wrap { padding: 0 20px 20px; }
        .search-bar { width: 100%; background: var(--bg-container); border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: white; outline: none; font-size: 16px; transition: 0.2s; }
        .search-bar:focus { border-color: var(--pink); }

        .bases { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 20px; }
        .base-item { background: var(--bg-2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .base-item img { width: 18px; height: 18px; border-radius: 50%; }

        .list { flex: 1; overflow-y: auto; border-top: 1px solid var(--border); }
        .row-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; }
        .row-item:hover { background: var(--bg-2); }
        .row-item img { width: 36px; height: 36px; border-radius: 50%; }

        /* NFT GRID FIX */
        .nft-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
        .nft-card { background: var(--bg-1); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        .nft-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://app.uniswap.org/favicon.png" width="30" onclick="switchSection('swap')">
            <div class="nav-links">
                <div id="nav-swap" class="active" onclick="switchSection('swap')">Swap</div>
                <div id="nav-tokens" onclick="switchSection('tokens')">Tokens</div>
                <div id="nav-nfts" onclick="switchSection('nfts')">NFTs</div>
            </div>
        </div>
        <button class="base-item" id="wallet" onclick="connect()">Connect</button>
    </header>

    <div class="page-container">
        <!-- SWAP SECTION -->
        <div id="sec-swap" class="active">
            <h1 class="hero">Swap anytime,<br>anywhere.</h1>
            <div class="swap-card">
                <div class="input-module">
                    <div class="label">Sell</div>
                    <div class="row">
                        <input type="number" id="inAmt" placeholder="0" oninput="quote()">
                        <div class="token-pill" onclick="openModal('sell')">
                            <img id="sell-icon" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png">
                            <span id="sell-sym">ETH</span>
                        </div>
                    </div>
                </div>
                <div class="arrow-box">↓</div>
                <div class="input-module">
                    <div class="label">Buy</div>
                    <div class="row">
                        <input type="number" id="outAmt" placeholder="0" readonly>
                        <div class="token-pill" id="buy-btn" onclick="openModal('buy')" style="background:var(--pink); border:none; color:white;">
                            <img id="buy-icon" src="" style="display:none">
                            <span id="buy-sym">Select token</span>
                        </div>
                    </div>
                </div>
                <button class="action-btn" id="mainAction" onclick="connect()">Get started</button>
            </div>
        </div>

        <!-- NFT SECTION -->
        <div id="sec-nfts" style="display:none">
            <h2 style="margin-bottom:24px;">Trending Collections</h2>
            <div class="nft-grid">
                <div class="nft-card">
                    <img src="https://i.seadn.io/gae/Ju9Cqy-mBcyv_vS737M9t6z3e_xH0E88V6LTo32NisE636D8u0_h4vWc6vYlFfS_C8_L9?auto=format&w=800">
                    <div style="padding:20px;"><b>Bored Ape Yacht Club</b><br><span style="color:var(--gray)">Floor: 22.4 ETH</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOKEN SELECT MODAL -->
    <div class="overlay" id="modal" onclick="this.style.display='none'">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><span>Select a token</span><span style="cursor:pointer" onclick="closeM()">✕</span></div>
            <div class="search-wrap"><input type="text" class="search-bar" placeholder="Search name or paste address" id="search-input"></div>
