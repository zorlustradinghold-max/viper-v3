<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #131313;
            --well: #1B1B1B;
            --pink: #FC00BD;
            --dark-pink: #2e0d21;
            --text-gray: #9B9B9B;
            --text-dim: #5D5D5D;
            --border: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow-x: hidden;
        }

        /* WELL ARCHITECTURE */
        .well-top {
            background: var(--card);
            border-radius: 24px 24px 4px 4px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .well-bottom {
            background: var(--card);
            border-radius: 4px 4px 24px 24px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .canyon-gap {
            height: 4px;
            background: var(--bg);
            position: relative;
        }
        .flip-arrow {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: #1B1B1B;
            border: 4px solid var(--bg);
            border-radius: 12px;
            padding: 6px;
            z-index: 10;
        }

        /* DYNAMIC TYPOGRAPHY */
        #amt-s {
            background: transparent; border: none; outline: none;
            font-size: 44px; font-weight: 500; width: 100%;
            color: var(--text-dim); letter-spacing: -0.05em;
            transition: font-size 0.05s ease;
        }
        #amt-s.active { color: white; }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 16px; border-radius: 20px;
            background: var(--dark-pink); color: var(--pink);
            font-weight: 600; font-size: 18px; margin-top: 12px;
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }

        /* CIRCLE TOKENS */
        .token-circle {
            width: 36px; height: 36px; border-radius: 50%;
            background: #1B1B1B; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
        }

        /* BOTTOM SHEETS */
        .sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #131313; border-radius: 24px 24px 0 0;
            z-index: 1000; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0, 0.7, 0.3, 1);
            max-height: 92vh; overflow-y: auto;
        }
        .sheet-active { transform: translateY(0); }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; z-index: 900; backdrop-filter: blur(4px);
        }

        /* UTILS */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav class="flex justify-between items-center px-4 py-4 sticky top-0 bg-black z-50">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Uniswap_Logo.svg" class="w-7 h-7">
            <svg onclick="openSheet('menu')" class="cursor-pointer text-zinc-400" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
        <div class="flex items-center gap-4">
            <svg class="text-zinc-500" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <svg class="text-zinc-500" width="22" height="22" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="0.5"/><circle cx="19" cy="12" r="0.5"/><circle cx="5" cy="12" r="0.5"/></svg>
            <button class="bg-[#FC00BD1A] text-[#FC00BD] px-4 py-1.5 rounded-2xl font-bold text-sm">Connect</button>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="px-6 pt-10 flex flex-col items-center">
        <h1 class="text-[42px] font-medium leading-[1.1] text-center mb-10 tracking-tight text-[#EAEAEA]">
            Swap anytime,<br>anywhere.
        </h1>

        <div class="w-full max-w-[480px]">
            <div class="well-top">
                <div class="text-sm font-medium text-zinc-500 mb-2">Sell</div>
                <div class="flex justify-between items-center">
                    <input type="number" id="amt-s" placeholder="0" oninput="sync()">
                    <button class="bg-[#1B1B1B] border border-white/5 rounded-full p-1 pr-3 flex items-center gap-2">
                        <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span class="font-bold">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-s" class="text-sm font-medium text-zinc-600 mt-1">$0</div>
            </div>

            <div class="canyon-gap">
                <div class="flip-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" stroke-width="3.5"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
                </div>
            </div>

            <div class="well-bottom">
                <div class="text-sm font-medium text-zinc-500 mb-4">Buy</div>
                <div class="flex items-center justify-between">
                    <div class="flex gap-2.5">
                        <div class="token-circle" onclick="pick('ETH')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-5 h-5"></div>
                        <div class="token-circle" onclick="pick('USDC')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png" class="w-5 h-5"></div>
                        <div class="token-circle" onclick="pick('USDT')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="w-5 h-5"></div>
                        <div class="token-circle" onclick="pick('WBTC')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599/logo.png" class="w-5 h-5"></div>
                    </div>
                    <button id="buy-trigger" onclick="openSheet('tokens')" class="bg-[#FC00BD] text-white px-4 py-2 rounded-full font-bold text-sm">Select token</button>
                </div>
                <div id="buy-amt" class="text-[32px] font-medium text-zinc-800 mt-3">0</div>
            </div>

            <button class="btn-main">Get started</button>

            <p class="text-center text-[13px] text-zinc-500 mt-8 leading-[1.6] px-4">
                Buy and sell crypto with <span class="text-[#FC00BD]">zero app fees</span> on 19+ networks including Ethereum, Unichain, and Base.
            </p>
        </div>
    </main>

    <!-- OVERLAYS & SHEETS -->
    <div id="overlay" class="overlay" onclick="closeSheet()"></div>

    <!-- 1:1 MENU SHEET -->
    <div id="menu" class="sheet p-6 no-scrollbar">
        <div class="w-10 h-1.5 bg-[#333] rounded-full mx-auto mb-8"></div>
        <div class="space-y-8">
            <section>
                <h3 class="text-zinc-500 text-[13px] font-bold uppercase tracking-wider mb-4">App</h3>
                <div class="flex items-center gap-4 py-3 text-xl font-medium"><img src="https://raw.githubusercontent.com/Uniswap/interface/main/src/assets/svg/swap_active.svg" class="w-6 h-6 invert opacity-50"> Trade</div>
                <div class="flex items-center gap-4 py-3 text-xl font-medium"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-2 6-6 2 2-6 6-2z"/></svg> Explore</div>
                <div class="flex items-center gap-4 py-3 text-xl font-medium"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg> Pool</div>
            </section>
            <section>
                <h3 class="text-zinc-500 text-[13px] font-bold uppercase tracking-wider mb-4">Products</h3>
                <div class="flex items-center gap-4 py-3 text-xl font-medium"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Uniswap_Logo.svg" class="w-6 h-6"> Wallet</div>
                <div class="flex items-center gap-4 py-3 text-xl font-medium"><svg width="24" height="24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> UniswapX</div>
            </section>
            <div class="flex gap-6 py-8 border-t border-white/5">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
        </div>
    </div>

    <!-- 1:1 TOKENS SHEET -->
    <div id="tokens" class="sheet p-5 no-scrollbar">
        <div class="w-10 h-1.5 bg-[#333] rounded-full mx-auto mb-6"></div>
        <div class="bg-black border border-white/5 rounded-2xl p-4 flex items-center gap-3 mb-6">
            <svg class="text-zinc-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search tokens" class="bg-transparent outline-none w-full text-lg">
        </div>
        <div class="grid grid-cols-5 gap-4">
            <div class="flex flex-col items-center gap-2" onclick="pick('ETH')">
                <div class="token-circle w-14 h-14 bg-zinc-900 border-none"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-8 h-8"></div>
                <span class="text-xs font-bold text-zinc-500">ETH</span>
            </div>
            <div class="flex flex-col items-center gap-2" onclick="pick('USDC')">
                <div class="token-circle w-14 h-14 bg-zinc-900 border-none"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png" class="w-8 h-8"></div>
                <span class="text-xs font-bold text-zinc-500">USDC</span>
            </div>
        </div>
    </div>

    <script>
        const rates = { ETH: 3185.40, USDC: 1, USDT: 1, WBTC: 65200 };
        let currentBuy = null;

        function sync() {
            const input = document.getElementById('amt-s');
            const val = parseFloat(input.value) || 0;
            
            // Dynamic Font Sizing
            if (input.value.length > 8) input.style.fontSize = '32px';
            else if (input.value.length > 5) input.style.fontSize = '38px';
            else input.style.fontSize = '44px';

            input.classList.toggle('active', val > 0);
            const fiat = val * rates.ETH;
            document.getElementById('fiat-s').innerText = `$${fiat.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            if(currentBuy) {
                const out = fiat / rates[currentBuy];
                const display = document.getElementById('buy-amt');
                display.innerText = out > 0 ? out.toLocaleString(undefined, {maximumFractionDigits: 6}) : '0';
                display.style.color = out > 0 ? 'white' : '#1e1e1e';
            }
        }

        function pick(sym) {
            currentBuy = sym;
            const btn = document.getElementById('buy-trigger');
            const addr = sym === 'ETH' ? '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2' : '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48';
            btn.innerHTML = `<img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/${addr}/logo.png" class="w-5 h-5 rounded-full"> <span class="font-bold">${sym}</span>`;
            btn.className = "bg-[#1B1B1B] border border-white/5 rounded-full px-3 py-2 flex items-center gap-2 text-white";
            closeSheet();
            sync();
        }

        function openSheet(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).classList.add('sheet-active');
        }
        function closeSheet() {
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('sheet-active'));
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
