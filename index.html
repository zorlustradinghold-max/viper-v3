<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap | NFT Hub 1:1</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #000000; --bg-1: #0D0D0D; --bg-2: #131313; --bg-3: #1B1B1B;
            --pink: #FF007A; --text-1: #FFFFFF; --text-2: #9B9B9B; --border: #222222;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg-0); color: var(--text-1); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        header { 
            width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); 
            border-bottom: 1px solid #191919; z-index: 10000; pointer-events: auto;
        }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .nav-pills { display: flex; background: var(--bg-1); padding: 4px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-pills span { 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; color: var(--text-2); 
            font-weight: 500; font-size: 15px; transition: 0.15s; pointer-events: all;
        }
        .nav-pills span.active { color: var(--text-1); background: var(--bg-3); }

        .page-wrap { margin-top: 40px; width: 100%; max-width: 480px; z-index: 1; }
        .section { display: none; width: 100%; animation: fadeIn 0.2s ease; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* NFT GRID: PRODUCTION 1:1 */
        .nft-container { width: 100%; display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 10px; }
        .nft-card { 
            background: var(--bg-1); border-radius: 20px; border: 1px solid var(--border); 
            overflow: hidden; cursor: pointer; transition: 0.2s; position: relative;
        }
        .nft-card:hover { border-color: #444; transform: translateY(-2px); }
        
        /* THE IMAGE FIX: USING DIRECT IPFS PROXIES */
        .nft-img { 
            width: 100%; aspect-ratio: 1; background-size: cover; background-position: center; 
            background-color: #1a1a1a; 
        }

        .nft-info { padding: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
        .nft-info b { font-size: 18px; display: block; }
        .nft-info span { color: var(--text-2); font-size: 14px; }
        
        .buy-pill { background: #1b1b1b; padding: 4px 12px; border-radius: 10px; font-weight: 600; border: 1px solid #333; }

        /* SWAP BOX FIXES */
        .swap-card { background: var(--bg-1); border-radius: 24px; padding: 8px; border: 1px solid var(--border); width: 100%; }
        .input-module { background: var(--bg-2); border-radius: 16px; padding: 16px; margin: 4px 0; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        input { background: none; border: none; color: white; font-size: 36px; width: 55%; outline: none; }
        .token-pill { background: #000; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; gap: 8px; font-weight: 700; border: 1px solid #222; cursor: pointer; }
        .token-pill img { width: 22px; height: 22px; border-radius: 50%; }

        .btn-main { 
            width: 100%; background: #22121b; color: var(--pink); border: none; 
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984/logo.png" style="width:30px; cursor:pointer;" onclick="tab('swap')">
            <div class="nav-pills">
                <span id="tab-swap" class="active" onclick="tab('swap')">Swap</span>
                <span id="tab-tokens" onclick="tab('tokens')">Tokens</span>
                <span id="tab-nfts" onclick="tab('nfts')">NFTs</span>
            </div>
        </div>
        <button style="background:var(--bg-1); color:white; border:1px solid var(--border); padding:8px 16px; border-radius:18px; font-weight:600;" onclick="connect()">Connect</button>
    </header>

    <div class="page-wrap">
        <!-- SWAP SECTION -->
        <div id="page-swap" class="section active">
            <h1 style="font-size:36px; letter-spacing:-1.5px; margin-bottom:24px; align-self:flex-start;">Swap anytime,<br>anywhere.</h1>
            <div class="swap-card">
                <div class="input-module">
                    <div style="font-size:14px; color:var(--text-2); margin-bottom:10px;">Sell</div>
                    <div class="row"><input type="number" id="in" placeholder="0"><div class="token-pill"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png"> ETH</div></div>
                </div>
                <div style="text-align:center; margin:-15px 0; color:var(--text-2); z-index:5; position:relative;">↓</div>
                <div class="input-module">
                    <div style="font-size:14px; color:var(--text-2); margin-bottom:10px;">Buy</div>
                    <div class="row"><input type="number" id="out" placeholder="0" readonly><div class="token-pill" style="background:var(--pink); color:white; border:none;">Select token</div></div>
                </div>
                <button class="btn-main" id="act" onclick="connect()">Get started</button>
            </div>
        </div>

        <!-- NFTS SECTION (PIXEL PERFECT ASSET FIX) -->
        <div id="page-nfts" class="section">
            <h2 style="align-self:flex-start; margin-bottom:20px;">Trending Collections</h2>
            <div class="nft-container">
                <!-- BAYC: Direct High-Res CDN Link -->
                <div class="nft-card">
                    <div class="nft-img" style="background-image: url('https://i.seadn.io/gae/Ju9Cqy-mBcyv_vS737M9t6z3e_xH0E88V6LTo32NisE636D8u0_h4vWc6vYlFfS_C8_L9?auto=format&dpr=1&w=1000');"></div>
                    <div class="nft-info">
                        <div><b>Bored Ape Yacht Club</b><span>Floor: 22.4 ETH</span></div>
                        <div class="buy-pill">Buy</div>
                    </div>
                </div>
                <!-- AZUKI: Direct High-Res CDN Link -->
                <div class="nft-card">
                    <div class="nft-img" style="background-image: url('https://i.seadn.io/gcs/files/6573c00392fdf21f7596001a4e1d522f.png?auto=format&dpr=1&w=1000');"></div>
                    <div class="nft-info">
                        <div><b>Azuki</b><span>Floor: 6.8 ETH</span></div>
                        <div class="buy-pill">Buy</div>
                    </div>
                </div>
                <!-- MILADY: Direct High-Res CDN Link -->
                <div class="nft-card">
                    <div class="nft-img" style="background-image: url('https://i.seadn.io/gcs/files/69661596700f135b55073147571f592d.png?auto=format&dpr=1&w=1000');"></div>
                    <div class="nft-info">
                        <div><b>Milady Maker</b><span>Floor: 4.2 ETH</span></div>
                        <div class="buy-pill">Buy</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function tab(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-pills span').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                document.getElementById('act').innerText = "Swap";
                document.getElementById('act').style.background = "var(--pink)";
                document.getElementById('act').style.color = "white";
            } else {
                alert("Please install MetaMask.");
            }
        }
    </script>
</body>
</html>
