<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap | Identical & Indestructible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FC00BD; --bg: #0D0D0D; --card: #131313; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .squircle { border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background: var(--card); transition: all 0.4s cubic-bezier(0.15, 0, 0.15, 1); }
        .btn-pink { background: var(--pink); border-radius: 18px; font-weight: 700; transition: all 0.1s ease; box-shadow: 0 4px 12px rgba(252, 0, 189, 0.2); }
        .btn-pink:active { transform: scale(0.95); filter: brightness(0.9); }
        .swap-arrow { background: var(--card); border: 4px solid var(--bg); border-radius: 12px; z-index: 30; transition: all 0.2s ease; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 300; max-height: 90vh; }
        .active-sheet { transform: translateY(0); }
        .move-top { transform: translateY(126px); }
        .move-bot { transform: translateY(-126px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .shimmer { background: linear-gradient(90deg, #131313 25%, #1b1b1b 50%, #131313 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <!-- Header -->
    <nav class="w-full max-w-[480px] flex justify-between items-center p-4">
        <div class="flex items-center gap-4">
            <!-- INLINE SVG LOGO (CANNOT BREAK) -->
            <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><path d="M38.86 19.34C36.42 16.9 31.94 13.78 26.54 12.02C23.06 10.9 19.18 10.3 15.5 10.3C13.58 10.3 11.78 10.42 10.1 10.74C10.1 10.74 8.78 10.98 8.42 11.3C8.06 11.62 8.3 12.98 8.3 12.98C8.62 14.66 8.74 16.46 8.74 18.38C8.74 22.06 8.14 25.94 7.02 29.42C5.26 34.82 2.14 39.3 0 41.74L6.26 48C11.18 43.08 17.18 36.62 20.34 30.22C23.5 36.62 29.5 43.08 34.42 48L40.68 41.74C38.54 39.3 35.42 34.82 33.66 29.42C32.54 25.94 31.94 22.06 31.94 18.38C31.94 16.46 32.06 14.66 32.38 12.98" fill="#FC00BD"/></svg>
            <button onclick="openS('nav-drawer')" class="active:opacity-50 transition-opacity">
                <!-- INLINE MENU ICON -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <button id="connectBtn" onclick="simWallet()" class="bg-[#FC00BD1A] text-[#FC00BD] border border-[#FC00BD33] px-4 py-1.5 rounded-2xl font-bold text-sm transition-all active:scale-95">Connect</button>
    </nav>

    <!-- Main Interface -->
    <main class="w-full max-w-[480px] px-4 mt-12">
        <h1 class="text-[34px] font-medium tracking-tighter leading-tight mb-8">Swap anytime,<br>anywhere.</h1>

        <div class="relative flex flex-col gap-1">
            <!-- SELL CARD -->
            <div id="sell" class="squircle p-4 z-10 transition-transform duration-500">
                <div class="flex justify-between text-sm font-medium text-zinc-500 mb-2">
                    <span>Sell</span>
                    <span id="bal" class="opacity-0 transition-opacity">Balance: 1.24</span>
                </div>
                <div class="flex justify-between items-center">
                    <input type="text" id="sIn" placeholder="0" class="bg-transparent text-4xl outline-none w-full font-medium placeholder-zinc-800">
                    <button onclick="openS('token-modal')" class="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full hover:bg-zinc-800 transition-all">
                        <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full" alt="ETH">
                        <span class="font-bold">ETH</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" stroke-width="4"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="sFiat" class="text-sm text-zinc-600 mt-1 font-medium tracking-tight">$0</div>
            </div>

            <!-- SWAP TOGGLE -->
            <div class="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                <button onclick="animateSwap()" class="swap-arrow p-2.5 active:scale-90 shadow-2xl">
                    <svg id="arrowIcon" class="text-zinc-500 transition-transform duration-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"></path></svg>
                </button>
            </div>

            <!-- BUY CARD -->
            <div id="buy" class="squircle p-4 transition-transform duration-500">
                <div class="text-sm font-medium text-zinc-500 mb-2">Buy</div>
                <div class="flex justify-between items-center">
                    <div id="bVal" class="text-4xl text-zinc-800 font-medium">0</div>
                    <button onclick="openS('token-modal')" class="btn-pink text-white px-5 py-2.5 text-[15px]">Select token</button>
                </div>
                <div id="gas" class="text-[11px] text-zinc-600 mt-4 opacity-0 transition-opacity">⛽ $3.84 • Auto Route</div>
            </div>

            <button id="mainBtn" class="w-full mt-3 bg-pink-500/10 text-pink-500 py-5 rounded-[24px] font-bold text-lg border border-pink-500/10 active:scale-98 transition-all">Get started</button>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" onclick="closeAll()" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-[250] transition-opacity"></div>

    <!-- Navigation Drawer -->
    <div id="nav-drawer" class="bottom-sheet p-6">
        <div class="w-12 h-1.5 bg-zinc-800 rounded-full mx-auto mb-6"></div>
        <div class="flex flex-col gap-5 text-white font-semibold text-lg">
            <div class="text-[#FC00BD]">Trade</div>
            <div class="opacity-50">Explore</div>
            <div class="opacity-50">Pool</div>
        </div>
    </div>

    <!-- Token Modal -->
    <div id="token-modal" class="bottom-sheet p-6 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-xl">Select a token</span>
            <button onclick="closeAll()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <input type="text" id="tSearch" class="w-full bg-[#0D0D0D] border border-white/5 rounded-2xl py-4 px-4 outline-none focus:border-pink-500/50 mb-4" placeholder="Search name or paste address">
        <div id="tList" class="flex flex-col gap-1"></div>
    </div>

    <script>
        const tokens = [
            { s: 'ETH', n: 'Ether', img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png' },
            { s: 'USDC', n: 'USD Coin', img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' },
            { s: 'USDT', n: 'Tether', img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
            { s: 'WBTC', n: 'Wrapped BTC', img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599/logo.png' }
        ];

        let price = 2460.50;

        // Init Token List
        function renderTokens(query = '') {
            const container = document.getElementById('tList');
            container.innerHTML = '';
            tokens.filter(t => t.s.includes(query.toUpperCase()) || t.n.toUpperCase().includes(query.toUpperCase())).forEach(t => {
                container.innerHTML += `<div class="flex items-center justify-between p-3 hover:bg-white/5 rounded-2xl cursor-pointer"><div class="flex items-center gap-4"><img src="${t.img}" class="w-10 h-10 rounded-full"><div><p class="font-bold">${t.n}</p><p class="text-xs text-zinc-500">${t.s}</p></div></div></div>`;
            });
        }
        document.getElementById('tSearch').addEventListener('input', (e) => renderTokens(e.target.value));
        renderTokens();

        // Wallet Logic
        function simWallet() {
            const cBtn = document.getElementById('connectBtn');
            const mBtn = document.getElementById('mainBtn');
            cBtn.innerText = '0x71C...74';
            cBtn.classList.replace('text-[#FC00BD]', 'text-white');
            cBtn.classList.replace('bg-[#FC00BD1A]', 'bg-zinc-800');
            document.getElementById('bal').classList.remove('opacity-0');
            mBtn.innerText = 'Swap';
            mBtn.classList.replace('text-pink-500', 'text-white');
            mBtn.classList.replace('bg-pink-500/10', 'bg-[#FC00BD]');
        }

        // Input Math
        document.getElementById('sIn').addEventListener('input', (e) => {
            let v = e.target.value.replace(/[^0-9.]/g, '');
            e.target.value = v;
            const n = parseFloat(v);
            if(n > 0) {
                document.getElementById('sFiat').innerText = '$' + (n * price).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('bVal').innerText = (n * (price - 1.1)).toFixed(2);
                document.getElementById('bVal').style.color = 'white';
                document.getElementById('gas').style.opacity = '1';
            } else {
                document.getElementById('sFiat').innerText = '$0';
                document.getElementById('bVal').innerText = '0';
                document.getElementById('bVal').style.color = '#27272a';
                document.getElementById('gas').style.opacity = '0';
            }
        });

        // Interface Logic
        let swapped = false;
        function animateSwap() {
            swapped = !swapped;
            document.getElementById('sell').classList.toggle('move-top');
            document.getElementById('buy').classList.toggle('move-bot');
            document.getElementById('arrowIcon').style.transform = swapped ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function openS(id) {
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById(id).classList.add('active-sheet');
            }, 10);
        }

        function closeAll() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active-sheet'));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
