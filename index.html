<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FC00BD; --bg: #0D0D0D; --card: #131313; --border: rgba(255,255,255,0.05); }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; margin: 0; }
        .squircle { border-radius: 24px; border: 1px solid var(--border); background: var(--card); transition: all 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #131313; border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; max-height: 95vh; padding: 24px; overflow-y: auto; }
        .drawer-active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-blur: 10px; z-index: 900; display: none; opacity: 0; transition: opacity 0.3s; }
        .move-down { transform: translateY(124px); }
        .move-up { transform: translateY(-124px); }
        .btn-pink { background: var(--pink); border-radius: 20px; font-weight: 700; width: 100%; padding: 16px; margin-top: 12px; box-shadow: 0 4px 20px rgba(252, 0, 189, 0.2); transition: all 0.2s; }
        .btn-pink:active { transform: scale(0.97); }
        .search-container { background: #0D0D0D; border: 1px solid var(--border); border-radius: 20px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .search-container input { background: transparent; border: none; outline: none; width: 100%; color: white; font-size: 16px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- HEADER: 1:1 SYNCED -->

        <div class="flex items-center gap-4">
            <!-- PRODUCTION DATA URI LOGO -->

            <svg onclick="openD('app-menu')" class="cursor-pointer text-zinc-500" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
        <div class="flex items-center gap-3">
            <svg onclick="openD('search-drawer')" class="cursor-pointer text-zinc-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <svg onclick="openD('settings-menu')" class="cursor-pointer text-zinc-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
            <button onclick="openD('wallet-menu')" class="bg-pink-600/10 text-[#FC00BD] px-4 py-1.5 rounded-2xl font-bold text-sm">Connect</button>
        </div>
    </nav>

    <!-- SWAP AREA -->
    <main class="w-full max-w-[480px] px-4 mt-12">
        <h1 class="text-[36px] font-medium tracking-tighter leading-tight mb-10 text-white">Swap anytime,<br>anywhere.</h1>

        <div class="relative flex flex-col gap-1">
            <div id="sell-box" class="squircle p-4 z-10 transition-transform duration-500">
                <div class="flex justify-between text-sm font-medium text-zinc-500 mb-2"><span>Sell</span><span>Balance: 1.24</span></div>
                <div class="flex justify-between items-center">
                    <input type="text" id="sIn" placeholder="0" class="bg-transparent text-4xl outline-none w-full font-medium placeholder-zinc-800 text-white">
                    <button onclick="openD('token-menu', 'sell')" class="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full">
                        <img id="img-s" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span id="sym-s" class="font-bold">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-s" class="text-sm text-zinc-600 mt-1">$0</div>
            </div>

            <div class="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                <button onclick="executeSwap()" class="bg-[#131313] p-3 rounded-2xl border-[6px] border-[#0D0D0D] active:scale-90 shadow-2xl">
                    <svg id="arr" class="text-zinc-500 transition-transform duration-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
                </button>
            </div>

            <div id="buy-box" class="squircle p-4">
                <div class="text-sm font-medium text-zinc-500 mb-2">Buy</div>
                <div class="flex justify-between items-center">
                    <div id="bVal" class="text-4xl text-zinc-800 font-medium">0</div>
                    <button id="bBtn" onclick="openD('token-menu', 'buy')" class="bg-[#FC00BD] text-white px-5 py-2.5 rounded-2xl font-bold text-[15px]">Select token</button>
                </div>
            </div>
            <button class="btn-pink">Get started</button>
        </div>
    </main>

    <!-- DRAWERS -->
    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <div id="token-menu" class="drawer">
        <h2 class="font-bold text-xl mb-6">Select a token</h2>
        <div class="search-container"><input type="text" id="tSearch" placeholder="Search name or address" oninput="renderT()"></div>
        <div id="tList"></div>
    </div>

    <div id="wallet-menu" class="drawer">
        <h2 class="font-bold text-xl mb-6 text-center">Connect a wallet</h2>
        <div class="flex flex-col gap-2">
            <div class="p-4 bg-white/5 rounded-2xl flex items-center gap-4 cursor-pointer" onclick="closeAll()"><img src="https://app.uniswap.org/static/media/metamask.023762d6.svg" width="30"> MetaMask</div>
        </div>
    </div>

    <script>
        const tokens = [
            { s: 'ETH', n: 'Ether', p: 3200, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png' },
            { s: 'USDC', n: 'USD Coin', p: 1, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' }
        ];

        let activeTarget = 'sell';
        let selT = tokens[0];

        function renderT() {
            const q = document.getElementById('tSearch').value.toLowerCase();
            const list = document.getElementById('tList');
            list.innerHTML = '';
            tokens.filter(x => x.s.toLowerCase().includes(q)).forEach(t => {
                list.innerHTML += `<div onclick="setT('${t.s}')" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 cursor-pointer"><img src="${t.img}" class="w-10 h-10 rounded-full"><div><p class="font-bold">${t.n}</p><p class="text-xs text-zinc-500">${t.s}</p></div></div>`;
            });
        }

        document.getElementById('sIn').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            if(v > 0) {
                document.getElementById('fiat-s').innerText = '$' + (v * selT.p).toLocaleString();
                document.getElementById('bVal').innerText = (v * (selT.p - 0.5)).toLocaleString();
                document.getElementById('bVal').style.color = 'white';
            } else {
                document.getElementById('fiat-s').innerText = '$0';
                document.getElementById('bVal').innerText = '0';
                document.getElementById('bVal').style.color = '#27272a';
            }
        });

        function executeSwap() {
            document.getElementById('sell-box').classList.toggle('move-down');
            document.getElementById('buy-box').classList.toggle('move-up');
            document.getElementById('arr').style.transform = document.getElementById('arr').style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function openD(id, side = 'sell') {
            activeTarget = side;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById(id).classList.add('drawer-active');
                if(id === 'token-menu') renderT();
            }, 10);
        }

        function setT(s) {
            const t = tokens.find(x => x.s === s);
            if(activeTarget === 'sell') {
                selT = t;
                document.getElementById('sym-s').innerText = t.s;
                document.getElementById('img-s').src = t.img;
            } else {
                document.getElementById('bBtn').innerHTML = `<img src="${t.img}" class="w-6 h-6 rounded-full"><span class="font-bold">${t.s}</span>`;
                document.getElementById('bBtn').className = "bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full";
            }
            closeAll();
        }

        function closeAll() {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('drawer-active'));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        renderT();
    </script>
</body>
</html>
