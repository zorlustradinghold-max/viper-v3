<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #FF007A; 
            --bg: #080808; 
            --card: #131313; 
            --well: #1B1B1B; 
            --border: rgba(255, 255, 255, 0.07);
        }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            margin: 0;
        }

        /* Uniswap Mesh Background */
        .bg-glow {
            position: fixed; top: 50%; left: 50%; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(255, 0, 122, 0.06) 0%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -1; filter: blur(120px);
        }

        /* Container Well Architecture */
        .swap-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px;
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .well {
            background: var(--well);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid transparent;
            transition: 0.2s ease;
        }
        .well:hover { border-color: rgba(255,255,255,0.08); }
        .well:focus-within { border-color: rgba(255,255,255,0.15); background: #222; }

        /* Centered Flip Button Seam */
        .flip-btn {
            position: absolute; left: 50%; top: calc(50% - 24px); transform: translate(-50%, -50%);
            background: var(--well); border: 4px solid var(--card); border-radius: 12px;
            padding: 8px; z-index: 10; cursor: pointer; transition: 0.2s;
        }
        .flip-btn:hover { background: #282828; transform: translate(-50%, -50%) scale(1.08); }

        /* Dynamic Input Logic */
        input[type="number"] {
            background: transparent; border: none; outline: none;
            font-size: 36px; font-weight: 500; width: 100%;
            color: #5D5D5D; letter-spacing: -0.05em;
        }
        input.active { color: white !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* Primary CTA Button */
        .cta-btn {
            width: 100%; padding: 16px; border-radius: 20px; font-weight: 600; font-size: 20px;
            margin-top: 4px; transition: 0.2s; background: var(--pink); color: white;
            box-shadow: 0 4px 12px rgba(255, 0, 122, 0.2);
        }
        .cta-btn:active { transform: scale(0.98); }

        /* Navigation Links */
        .nav-link { color: #9B9B9B; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: white; }

        /* Modal / Overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px); display: none; z-index: 1000;
        }
        .modal-active .modal-overlay { display: block; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="bg-glow"></div>

    <!-- NAVBAR -->
    <nav class="w-full flex justify-between items-center px-4 md:px-8 py-4">
        <div class="flex items-center gap-8">
            <!-- CORRECT 1:1 LOGO -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Uniswap_Logo.svg" class="w-8 h-8" alt="Uniswap">
            <div class="hidden lg:flex gap-6">
                <span class="nav-link active">Swap</span>
                <span class="nav-link">Explore</span>
                <span class="nav-link">NFTs</span>
                <span class="nav-link">Pool</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="hidden sm:flex bg-[#1B1B1B] border border-white/5 rounded-2xl px-3 py-1.5 items-center gap-2 font-bold text-sm">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-5 h-5 rounded-full">
                Ethereum
            </div>
            <button class="bg-[#FF007A1A] text-[#FF007A] px-4 py-1.5 rounded-2xl font-bold">Connect</button>
        </div>
    </nav>

    <!-- SWAP INTERFACE -->
    <main class="mt-20 w-full max-w-[484px] px-4">
        <!-- Card Header Icons -->
        <div class="flex justify-between items-center mb-3 px-2">
            <div class="flex gap-4 font-bold">
                <span class="text-white">Swap</span>
                <span class="text-[#9B9B9B] hover:text-white cursor-pointer transition">Buy</span>
            </div>
            <svg class="text-[#9B9B9B] hover:text-white cursor-pointer transition" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </div>

        <div class="swap-card">
            <!-- SELL SECTION -->
            <div class="well mb-1">
                <div class="text-sm font-medium text-[#9B9B9B] mb-3">Sell</div>
                <div class="flex justify-between items-center">
                    <input type="number" id="amt-s" placeholder="0" oninput="updatePrice()">
                    <button onclick="openModal('sell')" class="bg-[#222] border border-white/5 rounded-full px-1 py-1 pr-3 flex items-center gap-2 hover:bg-[#2c2c2c] transition">
                        <img id="img-s" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span id="sym-s" class="text-xl font-bold">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-s" class="text-sm text-[#5D5D5D] font-medium mt-3">$0.00</div>
            </div>

            <!-- THE FLIP -->
            <div class="flip-btn" onclick="swap()">
                <svg id="flip-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" stroke-width="3" style="transition:0.4s;"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
            </div>

            <!-- BUY SECTION -->
            <div class="well">
                <div class="text-sm font-medium text-[#9B9B9B] mb-3">Buy</div>
                <div class="flex justify-between items-center">
                    <input type="number" id="amt-b" placeholder="0" readonly>
                    <button id="btn-b" onclick="openModal('buy')" class="bg-[#FF007A] text-white px-4 py-1.5 rounded-full font-bold text-lg flex items-center gap-1 hover:bg-[#E8006F] transition">
                        Select token <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-b" class="text-sm text-[#5D5D5D] font-medium mt-3">$0.00</div>
            </div>

            <button class="cta-btn">Connect Wallet</button>
        </div>
    </main>

    <!-- TOKEN MODAL -->
    <div id="overlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="modal" class="fixed bottom-0 left-0 right-0 bg-[#131313] border-t border-white/5 rounded-t-[24px] z-[1001] p-5 translate-y-full transition-transform duration-300 sm:bottom-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 sm:w-[420px] sm:rounded-[24px] sm:border">
        <div class="flex justify-between items-center mb-5">
            <span class="font-bold text-lg">Select a token</span>
            <span onclick="closeModal()" class="cursor-pointer text-2xl text-zinc-500 hover:text-white">&times;</span>
        </div>
        <div class="bg-[#0D0D0D] border border-white/5 rounded-2xl p-3 mb-4 flex items-center gap-3">
            <svg width="20" height="20" fill="none" stroke="#5D5D5D" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search" placeholder="Search name or paste address" class="bg-transparent border-none outline-none text-base w-full" onkeyup="render()">
        </div>
        <!-- COMMON TOKENS -->
        <div class="flex flex-wrap gap-2 mb-4">
            <div onclick="select('ETH')" class="flex items-center gap-2 border border-white/5 rounded-xl px-2 py-1 cursor-pointer hover:bg-white/5 transition">
                <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-5 h-5 rounded-full">
                <span class="text-sm font-semibold">ETH</span>
            </div>
            <div onclick="select('USDC')" class="flex items-center gap-2 border border-white/5 rounded-xl px-2 py-1 cursor-pointer hover:bg-white/5 transition">
                <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png" class="w-5 h-5 rounded-full">
                <span class="text-sm font-semibold">USDC</span>
            </div>
        </div>
        <div id="list" class="max-h-[350px] overflow-y-auto"></div>
    </div>

    <script>
        const tokens = [
            { s: 'ETH', n: 'Ether', p: 3240, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png' },
            { s: 'USDC', n: 'USD Coin', p: 1, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' },
            { s: 'WBTC', n: 'Wrapped BTC', p: 63800, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599/logo.png' }
        ];

        let state = { mode: 'sell', sell: tokens[0], buy: null, rot: 0 };

        function updatePrice() {
            const val = parseFloat(document.getElementById('amt-s').value) || 0;
            const inS = document.getElementById('amt-s');
            
            inS.classList.toggle('active', val > 0);
            document.getElementById('fiat-s').innerText = `$${(val * state.sell.p).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            if (state.buy) {
                const out = (val * state.sell.p) / state.buy.p;
                document.getElementById('amt-b').value = out > 0 ? out.toFixed(6) : '';
                document.getElementById('amt-b').classList.toggle('active', out > 0);
                document.getElementById('fiat-b').innerText = `$${(out * state.buy.p).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            }
        }

        function openModal(m) {
            state.mode = m;
            document.body.classList.add('modal-active');
            document.getElementById('modal').style.transform = window.innerWidth < 640 ? 'translateY(0)' : 'translate(-50%, -50%)';
            render();
        }

        function closeModal() {
            document.body.classList.remove('modal-active');
            document.getElementById('modal').style.transform = window.innerWidth < 640 ? 'translateY(100%)' : 'translate(-50%, -45%)';
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            document.getElementById('list').innerHTML = tokens.filter(t => t.s.toLowerCase().includes(q) || t.n.toLowerCase().includes(q)).map(t => `
                <div onclick="select('${t.s}')" class="flex items-center justify-between p-3 hover:bg-white/5 rounded-2xl cursor-pointer transition">
                    <div class="flex items-center gap-3">
                        <img src="${t.img}" class="w-10 h-10 rounded-full">
                        <div><div class="font-bold">${t.n}</div><div class="text-xs text-[#5D5D5D]">${t.s}</div></div>
                    </div>
                </div>
            `).join('');
        }

        function select(s) {
            const t = tokens.find(x => x.s === s);
            state[state.mode] = t;
            if (state.mode === 'sell') {
                document.getElementById('img-s').src = t.img;
                document.getElementById('sym-s').innerText = t.s;
            } else {
                const btn = document.getElementById('btn-b');
                btn.className = "bg-[#222] border border-white/5 rounded-full px-1 py-1 pr-3 flex items-center gap-2 hover:bg-[#2c2c2c] transition";
                btn.innerHTML = `<img src="${t.img}" class="w-6 h-6 rounded-full"><span class="text-xl font-bold">${t.s}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>`;
            }
            closeModal();
            updatePrice();
        }

        function swap() {
            if (!state.buy) return;
            state.rot += 180;
            document.getElementById('flip-icon').style.transform = `rotate(${state.rot}deg)`;
            const temp = state.sell;
            state.sell = state.buy;
            state.buy = temp;
            state.mode = 'sell'; select(state.sell.s);
            state.mode = 'buy'; select(state.buy.s);
        }
    </script>
</body>
</html>
