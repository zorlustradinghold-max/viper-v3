<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap | 1:1 Repaired Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FC00BD; --bg: #0D0D0D; --card: #131313; --border: rgba(255,255,255,0.05); }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .squircle { border-radius: 24px; border: 1px solid var(--border); background: var(--card); transition: all 0.4s cubic-bezier(0.15, 0, 0.15, 1); }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #131313; border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 500; max-height: 95vh; padding: 24px; overflow-y: auto; }
        .drawer-active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-blur: 10px; z-index: 450; display: none; opacity: 0; transition: opacity 0.3s; }
        .move-down { transform: translateY(124px); }
        .move-up { transform: translateY(-124px); }
        .nav-icon { cursor: pointer; color: #9B9B9B; }
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 16px; cursor: pointer; }
        .list-row:active { background: rgba(255,255,255,0.08); }
        .search-box { background: #0D0D0D; border: 1px solid var(--border); border-radius: 20px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; color: white; font-size: 16px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- HEADER -->
    <nav class="w-full max-w-[480px] flex justify-between items-center p-4">
        <div class="flex items-center gap-4">
            <svg width="32" height="32" viewBox="0 0 160 160" fill="none"><path d="M80 150C118.66 150 150 118.66 150 80C150 41.3401 118.66 10 80 10C41.3401 10 10 41.3401 10 80C10 118.66 41.3401 150 80 150Z" fill="#FC00BD"/><path d="M120 75C120 90 105 110 80 110C55 110 40 90 40 75C40 60 55 50 80 50C105 50 120 60 120 75Z" fill="white"/><circle cx="65" cy="70" r="5" fill="#FC00BD"/><circle cx="95" cy="70" r="5" fill="#FC00BD"/></svg>
            <svg onclick="openD('app-menu')" class="nav-icon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
        <div class="flex items-center gap-3">
            <svg onclick="openD('search-drawer')" class="nav-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div onclick="openD('network-menu')" class="bg-zinc-900 p-1.5 rounded-xl border border-white/5 cursor-pointer"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/info/logo.png" class="w-5 h-5"></div>
            <svg onclick="openD('settings-menu')" class="nav-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
            <button onclick="openD('wallet-menu')" class="bg-[#FC00BD1A] text-[#FC00BD] px-4 py-1.5 rounded-2xl font-bold text-sm">Connect</button>
        </div>
    </nav>

    <!-- MAIN INTERFACE -->
    <main class="w-full max-w-[480px] px-4 mt-12">
        <h1 class="text-[34px] font-medium tracking-tighter leading-tight mb-8">Swap anytime,<br>anywhere.</h1>

        <div class="relative flex flex-col gap-1">
            <div id="sell" class="squircle p-4 z-10 transition-transform duration-500">
                <div class="flex justify-between text-sm font-medium text-zinc-500 mb-2"><span>Sell</span><span id="bal-s">Balance: 1.24</span></div>
                <div class="flex justify-between items-center">
                    <input type="number" id="sIn" placeholder="0" class="bg-transparent text-4xl outline-none w-full font-medium placeholder-zinc-800">
                    <button onclick="openD('token-menu', 'sell')" class="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full active:scale-95 transition-all">
                        <img id="img-s" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span id="sym-s" class="font-bold">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-s" class="text-sm text-zinc-600 mt-1 font-medium tracking-tight">$0</div>
            </div>

            <div class="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                <button onclick="animateSwap()" class="bg-[#131313] p-3 rounded-2xl border-[6px] border-[#0D0D0D] active:scale-90 transition-transform shadow-2xl">
                    <svg id="arr" class="text-zinc-500 transition-transform duration-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
                </button>
            </div>

            <div id="buy" class="squircle p-4 transition-transform duration-500">
                <div class="text-sm font-medium text-zinc-500 mb-2">Buy</div>
                <div class="flex justify-between items-center">
                    <div id="bVal" class="text-4xl text-zinc-800 font-medium">0</div>
                    <button id="bBtn" onclick="openD('token-menu', 'buy')" class="bg-[#FC00BD] text-white px-5 py-2.5 rounded-2xl font-bold text-[15px]">Select token</button>
                </div>
            </div>
            
            <button class="w-full mt-3 bg-pink-500/10 text-pink-500 py-5 rounded-[24px] font-bold text-lg border border-pink-500/10 active:scale-95 transition-all">Get started</button>
        </div>
        <p class="text-center text-zinc-500 text-[13px] mt-8 px-6 leading-relaxed">Buy and sell crypto with <span class="text-pink-500 font-bold">zero app fees</span> on 19+ networks including Ethereum, Unichain, and Base.</p>
    </main>

    <!-- DRAWERS -->
    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <!-- WALLET MODAL -->
    <div id="wallet-menu" class="drawer">
        <h2 class="font-bold text-xl mb-6 text-center">Connect a wallet</h2>
        <div class="list-row"><img src="https://app.uniswap.org/static/media/metamask.023762d6.svg" width="30"> MetaMask</div>
        <div class="list-row"><img src="https://app.uniswap.org/static/media/coinbaseWalletIcon.a3a7d7fd.svg" width="30"> Coinbase Wallet</div>
    </div>

    <!-- SEARCH DRAWER -->
    <div id="search-drawer" class="drawer">
        <div class="search-box"><input type="text" id="omniSearch" placeholder="Search tokens, pools, wallets" oninput="doSearch()"></div>
        <div id="results"></div>
    </div>

    <script>
        const tokens = [
            { s: 'ETH', n: 'Ether', p: 3250.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png' },
            { s: 'USDC', n: 'USD Coin', p: 1.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' }
        ];

        let side = 'sell';
        let selT = tokens[0];

        function doSearch() {
            const q = document.getElementById('omniSearch').value.toLowerCase();
            const r = document.getElementById('results');
            r.innerHTML = '';
            tokens.filter(x => x.s.toLowerCase().includes(q)).forEach(x => {
                r.innerHTML += `<div class="list-row"><img src="${x.img}" class="w-8 h-8 rounded-full"><div><p class="font-bold">${x.s}</p><p class="text-xs text-zinc-500">${x.n}</p></div></div>`;
            });
        }

        document.getElementById('sIn').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            const fiat = document.getElementById('fiat-s');
            const out = document.getElementById('bVal');
            if(v > 0) {
                fiat.innerText = '$' + (v * selT.p).toLocaleString();
                out.innerText = (v * (selT.p - 1.5)).toFixed(2);
                out.style.color = 'white';
            } else {
                fiat.innerText = '$0';
                out.innerText = '0';
                out.style.color = '#27272a';
            }
        });

        function animateSwap() {
            document.getElementById('sell').classList.toggle('move-down');
            document.getElementById('buy').classList.toggle('move-up');
            document.getElementById('arr').style.transform = document.getElementById('arr').style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function openD(id, s = 'sell') {
            side = s;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById(id).classList.add('drawer-active');
            }, 10);
        }

        function closeAll() {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('drawer-active'));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        doSearch();
    </script>
</body>
</html>
