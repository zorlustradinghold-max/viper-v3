<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap | Official Interface Mirror</title>
    <!-- Dependencies: Ethers.js & Inter Font Production Weights -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* OFFICIAL REPO COLOR MAPPING (#0D0D0D Surface, #000000 Base) */
        :root {
            --bg-0: #000000; --bg-1: #0D0D0D; --bg-2: #131313; --bg-3: #1B1B1B;
            --pink: #FF007A; --text-1: #FFFFFF; --text-2: #9B9B9B; --border: #222222;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg-0); color: var(--text-1); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* 1:1 PRODUCTION HEADER */
        header { 
            width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid #191919; z-index: 10000;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { width: 32px; height: 32px; filter: drop-shadow(0 0 5px var(--pink)); cursor: pointer; }
        .nav-pills { display: flex; background: var(--bg-1); padding: 4px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-pills span { padding: 8px 16px; border-radius: 12px; cursor: pointer; color: var(--text-2); font-weight: 500; font-size: 15px; transition: 0.15s; }
        .nav-pills span.active { color: var(--text-1); background: var(--bg-3); }
        .connect-btn { background: var(--bg-1); color: var(--text-1); border: 1px solid var(--border); padding: 10px 16px; border-radius: 18px; font-weight: 600; cursor: pointer; }

        /* 1:1 LAYOUT WRAPPER */
        .page-container { width: 100%; max-width: 480px; margin-top: 50px; padding: 0 12px; z-index: 1; }
        .hero-title { font-size: 38px; font-weight: 600; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 30px; }

        /* 1:1 SWAP MODULE ARCHITECTURE */
        .swap-card { background: var(--bg-1); border-radius: 24px; padding: 12px; border: 1px solid var(--border); box-shadow: 0 0 80px rgba(255,0,122,0.03); }
        .input-module { background: var(--bg-2); border-radius: 16px; padding: 16px; margin: 4px 0; border: 1px solid transparent; transition: 0.2s; }
        .input-module:focus-within { border-color: #333; background: #181818; }
        .label { font-size: 14px; color: var(--text-2); margin-bottom: 12px; font-weight: 500; }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        input.amt { background: none; border: none; color: white; font-size: 36px; width: 55%; outline: none; font-weight: 500; }
        
        .token-pill { 
            background: #000; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; 
            gap: 8px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; 
        }
        .token-pill img { width: 22px; height: 22px; border-radius: 50%; }

        .arrow-divider { 
            width: 40px; height: 40px; background: var(--bg-2); border: 4px solid var(--bg-1); 
            border-radius: 12px; margin: -20px auto; display: flex; justify-content: center; 
            align-items: center; position: relative; z-index: 5; cursor: pointer; color: var(--text-2);
        }

        .action-btn { 
            width: 100%; background: #22121b; color: var(--pink); border: none; 
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700; margin-top: 10px; cursor: pointer;
        }

        /* 1:1 SELECT TOKEN MODAL (REBUILT) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 20000; display: none; justify-content: center; align-items: center; }
        .modal { 
            background: var(--bg-1); width: 100%; max-width: 420px; border-radius: 20px; 
            border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; 
            max-height: 85vh; animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(15px); } to { transform: translateY(0); } }
        
        .search-field { 
            width: 100%; background: var(--bg-container); border: 1px solid var(--border); 
            padding: 16px; border-radius: 12px; color: white; outline: none; font-size: 16px; margin-bottom: 20px;
        }
        .search-field:focus { border-color: var(--pink); }

        .common-bases { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .base-item { 
            background: var(--bg-container); border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .base-item img { width: 20px; height: 20px; border-radius: 50%; }

        .token-list { overflow-y: auto; flex: 1; border-top: 1px solid #191919; margin: 0 -20px; padding: 10px 20px; }
        .token-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; cursor: pointer; }
        .token-row:hover { background: var(--bg-container); }
        .token-info { display: flex; flex-direction: column; }
        .token-symbol { font-weight: 600; font-size: 16px; }
        .token-name { color: var(--text-2); font-size: 13px; }

        .page-sec { display: none; }
        .page-sec.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://app.uniswap.org/favicon.png" class="logo" onclick="nav('swap')">
            <div class="nav-pills">
                <span id="nav-swap" class="active" onclick="nav('swap')">Swap</span>
                <span id="nav-tokens" onclick="nav('tokens')">Tokens</span>
                <span id="nav-nfts" onclick="nav('nfts')">NFTs</span>
            </div>
        </div>
        <button class="connect-btn" id="header-connect" onclick="connect()">Connect</button>
    </header>

    <div class="page-container">
        <!-- SWAP -->
        <div id="sec-swap" class="page-sec active">
            <h1 class="hero-title">Swap anytime,<br>anywhere.</h1>
            <div class="swap-card">
                <div class="input-module">
                    <div class="label">Sell</div>
                    <div class="row">
                        <input type="number" class="amt" placeholder="0" oninput="quote()">
                        <div class="token-pill" onclick="openModal('sell')">
                            <img id="sell-icon" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png">
                            <span id="sell-sym">ETH</span>
                        </div>
                    </div>
                </div>
                <div class="arrow-divider">↓</div>
                <div class="input-module">
                    <div class="label">Buy</div>
                    <div class="row">
                        <input type="number" id="buy-amt" class="amt" placeholder="0" readonly>
                        <div class="token-pill" id="buy-pill-style" onclick="openModal('buy')" style="background:var(--pink); border:none; color:white;">
                            <img id="buy-icon" src="" style="display:none">
                            <span id="buy-sym">Select token</span>
                        </div>
                    </div>
                </div>
                <button class="action-btn" id="action" onclick="connect()">Get started</button>
            </div>
        </div>

        <!-- NFTS (FROM SCRATCH) -->
        <div id="sec-nfts" class="page-sec">
            <h2 style="margin-bottom:24px;">Trending NFTs</h2>
            <div style="background:var(--bg-1); border-radius:24px; border:1px solid var(--border); overflow:hidden;">
                <img src="https://i.seadn.io/gae/Ju9Cqy-mBcyv_vS737M9t6z3e_xH0E88V6LTo32NisE636D8u0_h4vWc6vYlFfS_C8_L9?auto=format&w=800" style="width:100%">
                <div style="padding:16px;"><b>Bored Ape Yacht Club</b><br><span style="color:var(--text-2)">Floor: 22.4 ETH</span></div>
            </div>
        </div>
    </div>

    <!-- 1:1 SELECT MODAL -->
    <div class="overlay" id="token-modal" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="row" style="margin-bottom:20px;">
                <span style="font-weight:600">Select a token</span>
                <span style="cursor:pointer; color:var(--text-2)" onclick="closeModal()">✕</span>
            </div>
            <input type="text" class="search-field" placeholder="Search name or paste address" id="search-input">
            
            <div class="common-bases">
                <div class="base-item" onclick="pick('ETH', 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png"> ETH</div>
                <div class="base-item" onclick="pick('USDT', 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png"> USDT</div>
                <div class="base-item" onclick="pick('USDC', 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eb48/logo.png')"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eb48/logo.png"> USDC</div>
            </div>

            <div class="token-list">
                <div class="token-row" onclick="pick('UNI', 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984/logo.png')">
                    <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984/logo.png" width="36" height="36" style="border-radius:50%">
                    <div class="token-info"><span class="token-symbol">UNI</span><span class="token-name">Uniswap</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let target = 'sell';

        function nav(name) {
            document.querySelectorAll('.page-sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-pills span').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + name).classList.add('active');
            document.getElementById('nav-' + name).classList.add('active');
        }

        function openModal(t) { 
            target = t; 
            document.getElementById('token-modal').style.display='flex';
            document.getElementById('search-input').focus();
        }
        
        function closeModal() { document.getElementById('token-modal').style.display='none'; }

        function pick(sym, img) {
            document.getElementById(target + '-sym').innerText = sym;
            const icon = document.getElementById(target + '-icon');
            icon.src = img;
            icon.style.display = 'block';
            if(target === 'buy') document.getElementById('buy-pill-style').style.background = '#000';
            closeModal();
        }

        async function connect() {
            if (window.ethereum) {
                const p = new ethers.providers.Web3Provider(window.ethereum);
                await p.send("eth_requestAccounts", []);
                document.getElementById('action').innerText = 'Swap';
                document.getElementById('action').style.background = 'var(--pink)';
                document.getElementById('action').style.color = 'white';
            }
        }

        function quote() { /* Mock Logic */ }
    </script>
</body>
</html>
