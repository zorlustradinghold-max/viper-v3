<header>
    <div class="header-left">
        <svg class="logo" viewBox="0 0 160 160">
            <path fill="#FF007A" d="M80 0C35.817 0 0 35.817 0 80s35.817 80 80 80 80-35.817 80-80S124.183 0 80 0zm45.5 110.5c-2.3 2.3-5.2 3.5-8.5 3.5h-74c-3.3 0-6.2-1.2-8.5-3.5-2.3-2.3-3.5-5.2-3.5-8.5v-44c0-3.3 1.2-6.2 3.5-8.5 2.3-2.3 5.2-3.5 8.5-3.5h74c3.3 0 6.2 1.2 8.5 3.5 2.3 2.3 3.5 5.2 3.5 8.5v44c0 3.3-1.2 6.2-3.5 8.5z"/>
            <path fill="#FFF" d="M117 72h-14v-14c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v14h-14c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h14v14c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-14h14c1.1 0 2-.9 2-2v-4c0-1.1-.9-2-2-2z"/>
        </svg>
        <nav>
            <a href="#" class="active">Swap</a>
            <a href="#">Tokens</a>
            <a href="#">NFTs</a>
            <a href="#">Pool</a>
        </nav>
    </div>
    <div class="header-right">
        <div class="network-pill">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=025" width="16" alt="ETH">
            Ethereum
            <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
        </div>
        <button class="connect-btn" id="headerConnectBtn" onclick="connectWallet()">Connect</button>
    </div>
</header>

<main>
    <div class="swap-card">
        <div class="card-header">
            <span>Swap</span>
            <i class="fa-solid fa-gear"></i>
        </div>

        <!-- Panel 1: Pay -->
        <div class="input-panel" id="panelPay">
            <div class="panel-top">
                <span class="panel-label">You pay</span>
            </div>
            <div class="panel-main">
                <input type="number" class="panel-input" id="inputPay" placeholder="0" step="any">
                <div class="token-selector" id="tokenBtnPay">
                    <div class="token-icon eth-icon" id="iconPay">
                        <i class="fa-brands fa-ethereum"></i>
                    </div>
                    <span class="token-symbol" id="symbolPay">ETH</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 12px; color: var(--text-secondary);"></i>
                </div>
            </div>
            <div class="panel-footer">
                <span id="valuePay">$0.00</span>
                <span>Balance: 1.25 <span id="balanceSymPay">ETH</span></span>
            </div>
        </div>

        <!-- Arrow -->
        <div class="swap-arrow-wrapper">
            <div class="swap-arrow-btn" onclick="swapTokens()">
                <i class="fa-solid fa-arrow-down"></i>
            </div>
        </div>

        <!-- Panel 2: Receive -->
        <div class="input-panel" id="panelReceive">
            <div class="panel-top">
                <span class="panel-label">You receive</span>
            </div>
            <div class="panel-main">
                <input type="number" class="panel-input" id="inputReceive" placeholder="0" step="any">
                <div class="token-selector" id="tokenBtnReceive">
                    <div class="token-icon usdt-icon" id="iconReceive">
                        <i class="fa-solid fa-t"></i>
                    </div>
                    <span class="token-symbol" id="symbolReceive">USDT</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 12px; color: var(--text-secondary);"></i>
                </div>
            </div>
            <div class="panel-footer">
                <span id="valueReceive">$0.00</span>
                <span>Balance: 500.00 <span id="balanceSymReceive">USDT</span></span>
            </div>
        </div>

        <!-- Swap Info -->
        <div class="swap-info" id="swapInfo" style="display: none;">
            <div class="price-row">
                <span id="priceDisplay">1 ETH = 2415.60 USDT</span>
                <i class="fa-solid fa-info-circle"></i>
            </div>
            <div class="details-row">
                <span>Slippage tolerance</span>
                <span class="accent-text">0.5%</span>
            </div>
        </div>

        <!-- Button -->
        <button class="action-btn btn-swap-disabled" id="mainActionButton" onclick="handleAction()">Connect Wallet</button>
    </div>
</main>

<script>
    // Configuration
    const RATE = 2415.60;
    let isEthToUsdt = true;
    let walletConnected = false;

    // Elements
    const inputPay = document.getElementById('inputPay');
    const inputReceive = document.getElementById('inputReceive');
    const valuePay = document.getElementById('valuePay');
    const valueReceive = document.getElementById('valueReceive');
    const mainActionButton = document.getElementById('mainActionButton');
    const swapInfo = document.getElementById('swapInfo');
    const priceDisplay = document.getElementById('priceDisplay');

    const symbolPay = document.getElementById('symbolPay');
    const symbolReceive = document.getElementById('symbolReceive');
    const iconPay = document.getElementById('iconPay');
    const iconReceive = document.getElementById('iconReceive');
    const balanceSymPay = document.getElementById('balanceSymPay');
    const balanceSymReceive = document.getElementById('balanceSymReceive');

    // Logic: Input Calculation
    function updateValues(source) {
        const payVal = parseFloat(inputPay.value);
        const receiveVal = parseFloat(inputReceive.value);

        if (source === 'pay') {
            if (!isNaN(payVal) && payVal > 0) {
                const calculated = isEthToUsdt ? payVal * RATE : payVal / RATE;
                inputReceive.value = calculated.toFixed(isEthToUsdt ? 2 : 6);
            } else {
                inputReceive.value = '';
            }
        } else {
            if (!isNaN(receiveVal) && receiveVal > 0) {
                const calculated = isEthToUsdt ? receiveVal / RATE : receiveVal * RATE;
                inputPay.value = calculated.toFixed(isEthToUsdt ? 6 : 2);
            } else {
                inputPay.value = '';
            }
        }
        
        updateFiatMocks();
        updateButtonState();
    }

    function updateFiatMocks() {
        const val = parseFloat(inputPay.value) || 0;
        const fiat = isEthToUsdt ? val * RATE : val * 1; // Simplification
        valuePay.innerText = `$${fiat.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        valueReceive.innerText = `$${fiat.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        
        if (val > 0) {
            swapInfo.style.display = 'block';
        } else {
            swapInfo.style.display = 'none';
        }
    }

    // Logic: Token Swapping
    function swapTokens() {
        isEthToUsdt = !isEthToUsdt;
        
        // Swap Icons/Text
        const tempSym = symbolPay.innerText;
        const tempIconClass = iconPay.className;
        const tempIconInner = iconPay.innerHTML;

        symbolPay.innerText = symbolReceive.innerText;
        symbolReceive.innerText = tempSym;
        
        iconPay.className = iconReceive.className;
        iconReceive.className = tempIconClass;

        iconPay.innerHTML = iconReceive.innerHTML;
        iconReceive.innerHTML = tempIconInner;

        balanceSymPay.innerText = symbolPay.innerText;
        balanceSymReceive.innerText = symbolReceive.innerText;

        // Reset inputs
        inputPay.value = '';
        inputReceive.value = '';
        
        // Update Price Display
        priceDisplay.innerText = isEthToUsdt 
            ? `1 ETH = ${RATE} USDT` 
            : `1 USDT = ${(1/RATE).toFixed(6)} ETH`;

        updateValues('pay');
    }

    // Button States
    function updateButtonState() {
        const val = parseFloat(inputPay.value);
        
        if (!walletConnected) {
            mainActionButton.innerText = "Connect Wallet";
            mainActionButton.className = "action-btn btn-swap-ready"; // Active to allow clicking
            return;
        }

        if (isNaN(val) || val <= 0) {
            mainActionButton.innerText = "Enter an amount";
            mainActionButton.className = "action-btn btn-swap-disabled";
        } else {
            mainActionButton.innerText = "Swap";
            mainActionButton.className = "action-btn btn-swap-ready";
        }
    }

    function connectWallet() {
        walletConnected = true;
        document.getElementById('headerConnectBtn').innerText = "0x71C...4e31";
        document.getElementById('headerConnectBtn').style.background = "var(--panel-bg)";
        document.getElementById('headerConnectBtn').style.color = "var(--text-primary)";
        updateButtonState();
    }

    function handleAction() {
        if (!walletConnected) {
            connectWallet();
        } else {
            const amount = inputPay.value;
            const from = symbolPay.innerText;
            const to = symbolReceive.innerText;
            alert(`Transaction Mock: Swapping ${amount} ${from} for ${inputReceive.value} ${to}`);
        }
    }

    // Event Listeners
    inputPay.addEventListener('input', () => updateValues('pay'));
    inputReceive.addEventListener('input', () => updateValues('receive'));

    // Initial state
    updateButtonState();
</script>
