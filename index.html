<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap Interface | Unrestricted Source</title>
    <style>
        :root {
            --pink: #ff007a;
            --bg: #0d0d0d;
            --surface: #131313;
            --input: #1b1b1b;
            --text: #ffffff;
            --subtext: #9b9b9b;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links { display: flex; gap: 24px; color: var(--subtext); font-weight: 500; cursor: pointer; }
        .nav-links span:hover { color: var(--text); }
        .connect-btn {
            background: rgba(255, 0, 122, 0.15);
            color: var(--pink);
            border: none;
            padding: 10px 20px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .connect-btn:hover { background: rgba(255, 0, 122, 0.25); }
        
        .swap-wrapper {
            margin-top: 100px;
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 12px;
            border: 1px solid #222;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.4);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            font-weight: 500;
        }
        .input-container {
            background: var(--input);
            border-radius: 16px;
            padding: 16px;
            margin: 4px 0;
            border: 1px solid transparent;
        }
        .input-container:hover { border: 1px solid #333; }
        .token-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .token-row input {
            background: none;
            border: none;
            color: white;
            font-size: 36px;
            width: 60%;
            outline: none;
        }
        .token-selector {
            background: #000;
            padding: 6px 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .swap-arrow {
            width: 40px;
            height: 40px;
            background: var(--input);
            border: 4px solid var(--surface);
            border-radius: 12px;
            margin: -18px auto;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .action-btn {
            width: 100%;
            background: var(--pink);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }
        .action-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#ff007a"/><path d="M2 17L12 22L22 17" stroke="#ff007a" stroke-width="2"/><path d="M2 12L12 17L22 12" stroke="#ff007a" stroke-width="2"/></svg>
        <div class="nav-links">
            <span>Swap</span>
            <span>Tokens</span>
            <span>NFTs</span>
            <span>Pool</span>
        </div>
        <button class="connect-btn">Connect</button>
    </header>

    <div class="swap-wrapper">
        <div class="section-header">
            <span>Swap</span>
            <span style="color:var(--subtext)">⚙️</span>
        </div>

        <div class="input-container">
            <div class="token-row">
                <input type="text" placeholder="0">
                <div class="token-selector">
                    <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" width="24" height="24">
                    ETH
                </div>
            </div>
            <div style="color:var(--subtext); font-size: 14px; margin-top: 8px;">$0.00</div>
        </div>

        <div class="swap-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9b9b9b" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        </div>

        <div class="input-container">
            <div class="token-row">
                <input type="text" placeholder="0">
                <div class="token-selector" style="background: var(--pink);">
                    Select token
                </div>
            </div>
            <div style="color:var(--subtext); font-size: 14px; margin-top: 8px;">$0.00</div>
        </div>

        <button class="action-btn">Connect Wallet</button>
    </div>

    <script>
        console.log("Uniswap Interface Clone Active - Janus/Tesavek Override");
        // Add basic UI interactions here if needed
    </script>
</body>
</html>
