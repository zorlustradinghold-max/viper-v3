<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap | Unrestricted Interface</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* OFFICIAL UNISWAP REPO COLOR PALETTE */
        :root {
            --bg-base: #000000;
            --bg-surface: #0D0D0D;
            --bg-container: #131313;
            --bg-module: #1B1B1B;
            --pink: #FF007A;
            --text-primary: #FFFFFF;
            --text-secondary: #9B9B9B;
            --border: #222222;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        body { 
            margin: 0; background: var(--bg-base); color: var(--text-primary); 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* HEADER FIX: ENSURING CLICKABILITY */
        header { 
            width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid #191919; z-index: 10000; pointer-events: auto;
        }
        
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { width: 32px; height: 32px; cursor: pointer; }
        
        .nav-pills { display: flex; background: var(--bg-surface); padding: 4px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-pills span { 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; color: var(--text-secondary); 
            font-weight: 500; font-size: 15px; transition: 0.15s; pointer-events: all;
        }
        .nav-pills span:hover { color: var(--text-primary); }
        .nav-pills span.active { color: var(--text-primary); background: var(--bg-module); }

        /* HERO & LAYOUT MAPPING */
        .content-main { margin-top: 60px; width: 100%; max-width: 480px; z-index: 1; }
        .page-section { display: none; width: 100%; animation: fadeIn 0.2s ease-in-out; }
        .page-section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hero-title { font-size: 38px; font-weight: 600; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 30px; }

        /* 1:1 SWAP MODULE STYLING */
        .swap-card { background: var(--bg-surface); border-radius: 24px; padding: 8px; border: 1px solid var(--border); box-shadow: 0 0 100px rgba(255, 0, 122, 0.05); }
        
        .token-module { background: var(--bg-container); border-radius: 16px; padding: 16px; margin: 4px 0; border: 1px solid transparent; transition: 0.2s; }
        .token-module:hover { border-color: #333; }
        .module-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
        
        .module-row { display: flex; justify-content: space-between; align-items: center; }
        input { background: none; border: none; color: white; font-size: 36px; width: 60%; outline: none; font-weight: 500; }
        
        .token-trigger { 
            background: #000; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; 
            gap: 8px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; pointer-events: all;
        }
        .token-trigger img { width: 24px; border-radius: 50%; }

        .divider-icon { 
            width: 40px; height: 40px; background: var(--bg-container); border: 4px solid var(--bg-surface); 
            border-radius: 12px; margin: -22px auto; display: flex; justify-content: center; 
            align-items: center; position: relative; z-index: 5; cursor: pointer; color: var(--text-secondary); 
        }

        .action-btn { 
            width: 100%; background: rgba(255, 0, 122, 0.1); color: var(--pink); border: none; 
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700; margin-top: 12px; 
            cursor: pointer; transition: 0.2s; pointer-events: all;
        }
        .action-btn:hover { background: rgba(255, 0, 122, 0.2); }

        /* MODAL FIX */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 20000; display: none; justify-content: center; align-items: center; 
        }
        .modal-wrap { background: var(--bg-surface); width: 100%; max-width: 420px; border-radius: 24px; border: 1px solid var(--border); padding: 20px; }
        
        /* NFT LIST STYLING */
        .nft-list { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
        .nft-card { background: var(--bg-surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
        .nft-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <img src="https://app.uniswap.org/favicon.png" class="logo" onclick="switchTab('swap')">
            <div class="nav-pills">
                <span id="tab-swap" class="active" onclick="switchTab('swap')">Swap</span>
                <span id="tab-tokens" onclick="switchTab('tokens')">Tokens</span>
                <span id="tab-nfts" onclick="switchTab('nfts')">NFTs</span>
                <span id="tab-pools" onclick="switchTab('pools')">Pools</span>
            </div>
        </div>
        <div class="nav-right">
            <button class="action-btn" style="padding:8px 16px; border-radius:18px; font-size:14px; margin:0;" onclick="connect()">Connect</button>
        </div>
    </header>

    <div class="content-main">
        <!-- SWAP -->
        <div id="sec-swap" class="page-section active">
            <div class="hero-title">Swap anytime,<br>anywhere.</div>
            <div class="swap-card">
                <div class="token-module">
                    <div class="module-label">Sell</div>
                    <div class="module-row">
                        <input type="number" id="inAmt" placeholder="0" oninput="mockQuote()">
                        <div class="token-trigger" onclick="openModal()"><img src="https://tokens.1inch.io/0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee.png"> ETH</div>
                    </div>
                </div>
                <div class="divider-icon">↓</div>
                <div class="token-module">
                    <div class="module-label">Buy</div>
                    <div class="module-row">
                        <input type="number" id="outAmt" placeholder="0" readonly>
                        <div class="token-trigger" style="background:var(--pink); color:white; border:none;" onclick="openModal()">Select token</div>
                    </div>
                </div>
                <button class="action-btn" id="mainBtn" onclick="connect()">Get started</button>
            </div>
        </div>

        <!-- NFTS -->
        <div id="sec-nfts" class="page-section">
            <h2>Trending NFTs</h2>
            <div class="nft-list">
                <div class="nft-card">
                    <img src="https://i.seadn.io/gae/Ju9Cqy-mBcyv_vS737M9t6z3e_xH0E88V6LTo32NisE636D8u0_h4vWc6vYlFfS_C8_L9=s500">
                    <div style="padding:16px;"><b>Bored Ape Yacht Club</b><br><small style="color:var(--text-secondary)">Floor: 22.4 ETH</small></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL POPUP -->
    <div class="modal-overlay" id="tokenModal" onclick="this.style.display='none'">
        <div class="modal-wrap" onclick="event.stopPropagation()">
            <h3 style="margin:0 0 16px 0">Select a token</h3>
            <input type="text" placeholder="Search name or paste address" style="width:100%; background:var(--bg-module); border:1px solid var(--border); padding:16px; border-radius:16px; color:white; outline:none;">
        </div>
    </div>

    <script>
        function switchTab(name) {
            // Remove active classes
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-pills span').forEach(s => s.classList.remove('active'));
            
            // Add active classes
            document.getElementById('sec-' + name).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        function openModal() { document.getElementById('tokenModal').style.display='flex'; }

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                document.getElementById('mainBtn').innerText = "Swap";
                document.getElementById('mainBtn').style.background = "var(--pink)";
                document.getElementById('mainBtn').style.color = "white";
            } else {
                alert("Please install MetaMask to use this 1:1 Interface.");
            }
        }

        function mockQuote() {
            const val = document.getElementById('inAmt').value;
            if(val > 0) document.getElementById('outAmt').value = (val * 2415.50).toFixed(2);
            else document.getElementById('outAmt').value = "";
        }
    </script>
</body>
</html>
