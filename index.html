<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap Interface</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #000000;
            --bg-1: #0D0D0D;
            --bg-2: #131313;
            --bg-3: #1B1B1B;
            --pink: #FF007A;
            --text-1: #FFFFFF;
            --text-2: #9B9B9B;
            --border: #222222;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg-0); color: var(--text-1); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* HEADER & NAVIGATION (FIXED CLICKABILITY) */
        header { 
            width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
            border-bottom: 1px solid #191919; z-index: 10000; pointer-events: auto;
        }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-box { width: 32px; height: 32px; cursor: pointer; transition: 0.2s; }
        .logo-box:hover { transform: rotate(-10deg); }
        
        .nav-pills { display: flex; background: var(--bg-1); padding: 4px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-pills span { 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; color: var(--text-2); 
            font-weight: 500; font-size: 15px; transition: 0.15s; pointer-events: all;
        }
        .nav-pills span:hover { color: var(--text-1); }
        .nav-pills span.active { color: var(--text-1); background: var(--bg-3); }

        /* HERO & MODULES */
        .page-wrap { margin-top: 60px; width: 100%; max-width: 480px; z-index: 1; }
        .section { display: none; width: 100%; animation: fadeIn 0.2s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hero-title { font-size: 38px; font-weight: 600; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 24px; }

        /* SWAP MODULE (REVERSE ENGINEERED REPO STYLE) */
        .swap-card { background: var(--bg-1); border-radius: 24px; padding: 8px; border: 1px solid var(--border); box-shadow: 0 0 100px rgba(255, 0, 122, 0.05); }
        .input-module { background: var(--bg-2); border-radius: 16px; padding: 16px; margin: 4px 0; border: 1px solid transparent; transition: 0.2s; }
        .input-module:focus-within { border-color: #333; background: #151515; }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        input { background: none; border: none; color: white; font-size: 36px; width: 55%; outline: none; font-weight: 500; }
        
        /* 1:1 DYNAMIC TOKEN PILL */
        .token-pill { 
            background: #000; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; 
            gap: 8px; font-weight: 700; border: 1px solid var(--border); cursor: pointer; pointer-events: auto;
        }
        .token-pill img { width: 24px; height: 24px; border-radius: 50%; background: #222; }

        .swap-arrow { 
            width: 40px; height: 40px; background: var(--bg-2); border: 4px solid var(--bg-1); 
            border-radius: 12px; margin: -22px auto; display: flex; justify-content: center; 
            align-items: center; position: relative; z-index: 5; cursor: pointer; color: var(--text-2); transition: 0.2s;
        }
        .swap-arrow:hover { color: white; transform: rotate(180deg); }

        .btn-main { 
            width: 100%; background: rgba(255, 0, 122, 0.1); color: var(--pink); border: none; 
            padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700; margin-top: 10px; 
            cursor: pointer; pointer-events: auto;
        }
        .btn-main:hover { background: rgba(255, 0, 122, 0.15); }

        /* TOKEN MODAL (PIXEL PERFECT) */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 20000; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--bg-1); width: 100%; max-width: 420px; border-radius: 24px; border: 1px solid var(--border); padding: 20px; }
        .search-bar { width: 100%; background: var(--bg-2); border: 1px solid var(--border); padding: 16px; border-radius: 16px; color: white; outline: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <!-- PRODUCTION LOGO FROM UNISWAP REPO -->
            <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984/logo.png" class="logo-box" onclick="tab('swap')">
            <div class="nav-pills">
                <span id="tab-swap" class="active" onclick="tab('swap')">Swap</span>
                <span id="tab-tokens" onclick="tab('tokens')">Tokens</span>
                <span id="tab-nfts" onclick="tab('nfts')">NFTs</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-main" style="padding:8px 16px; border-radius:18px; font-size:14px; margin:0; background:var(--bg-1); color:white; border:1px solid var(--border);" onclick="connect()">Connect</button>
        </div>
    </header>

    <div class="page-wrap">
        <!-- SWAP SECTION -->
        <div id="page-swap" class="section active">
            <div class="hero-title">Swap anytime,<br>anywhere.</div>
            <div class="swap-card">
                <div class="input-module">
                    <div class="row"><input type="number" id="in" placeholder="0" oninput="quote()"><div class="token-pill" onclick="openM()"><img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png"> ETH</div></div>
                </div>
                <div class="swap-arrow">↓</div>
                <div class="input-module">
                    <div class="row"><input type="number" id="out" placeholder="0" readonly><div class="token-pill" style="background:var(--pink); color:white; border:none;" onclick="openM()">Select token</div></div>
                </div>
                <button class="btn-main" id="act" onclick="connect()">Get started</button>
            </div>
        </div>

        <!-- NFTS SECTION -->
        <div id="page-nfts" class="section">
            <h2 style="margin-bottom:20px;">NFT Collections</h2>
            <!-- PRODUCTION NFT MAPPING -->
            <div style="background:var(--bg-1); border-radius:24px; border:1px solid var(--border); overflow:hidden;">
                <img src="https://i.seadn.io/gae/Ju9Cqy-mBcyv_vS737M9t6z3e_xH0E88V6LTo32NisE636D8u0_h4vWc6vYlFfS_C8_L9=s500" style="width:100%">
                <div style="padding:16px;"><b>Bored Ape Yacht Club</b><br><small style="color:var(--text-2)">Floor: 22.4 ETH</small></div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="mod" onclick="this.style.display='none'">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 style="margin:0 0 16px 0">Select a token</h3>
            <input type="text" class="search-bar" placeholder="Search name or paste address">
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div style="display:flex; align-items:center; gap:12px; padding:10px; cursor:pointer;" onclick="closeM()">
                    <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" width="32">
                    <div><b>USDT</b><br><small style="color:var(--text-2)">Tether USD</small></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // REPO-DERIVED STATE MANAGEMENT
        function tab(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-pills span').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        function openM() { document.getElementById('mod').style.display='flex'; }
        function closeM() { document.getElementById('mod').style.display='none'; }

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                document.getElementById('act').innerText = "Swap";
                document.getElementById('act').style.background = "var(--pink)";
                document.getElementById('act').style.color = "white";
            }
        }

        function quote() {
            const v = document.getElementById('in').value;
            if(v > 0) document.getElementById('out').value = (v * 2418.12).toFixed(2);
            else document.getElementById('out').value = "";
        }
    </script>
</body>
</html>
