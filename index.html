<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniswap | Interface</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0D0D0D; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .squircle { border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.05); background: #131313; }
        .pink-glow { box-shadow: 0 0 20px rgba(252, 0, 189, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [isSwapped, setIsSwapped] = useState(false);
            const [val, setVal] = useState('');

            return (
                <div className="min-h-screen flex flex-col items-center">
                    {/* Header */}
                    <header className="w-full flex justify-between items-center p-4 max-w-2xl">
                        <div className="flex items-center gap-3">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Uniswap_Logo.svg" className="w-8 h-8" />
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </div>
                        <button className="bg-[#FC00BD1A] text-[#FC00BD] border border-[#FC00BD33] px-4 py-1.5 rounded-2xl font-bold text-sm">Connect</button>
                    </header>

                    {/* Main Interface */}
                    <main className="w-full max-w-[480px] px-4 mt-10">
                        <h1 className="text-[34px] font-medium leading-tight tracking-tighter mb-8">Swap anytime,<br/>anywhere.</h1>

                        <div className="relative flex flex-col gap-1">
                            {/* Sell Card */}
                            <div className={`squircle p-4 transition-all duration-500 z-10 ${isSwapped ? 'translate-y-[126px]' : 'translate-y-0'}`}>
                                <div className="text-sm font-medium text-zinc-500 mb-2">Sell</div>
                                <div className="flex justify-between items-center">
                                    <input 
                                        type="number" 
                                        placeholder="0" 
                                        value={val}
                                        onChange={(e) => setVal(e.target.value)}
                                        className="bg-transparent text-4xl outline-none w-full placeholder-zinc-800 font-medium"
                                    />
                                    <div className="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-4 rounded-full">
                                        <img src="https://app.uniswap.org/static/media/eth-logo.4054a323.png" className="w-6 h-6"/>
                                        <span className="font-bold">ETH</span>
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M6 9l6 6 6-6"/></svg>
                                    </div>
                                </div>
                                <div className="text-sm text-zinc-600 mt-1 font-medium">$0</div>
                            </div>

                            {/* Swap Toggle Button */}
                            <div className="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                                <button 
                                    onClick={() => setIsSwapped(!isSwapped)}
                                    className="bg-[#131313] p-2.5 rounded-xl border-[5px] border-[#0D0D0D] hover:scale-110 active:scale-95 transition-all shadow-2xl"
                                >
                                    <svg className={`text-zinc-500 transition-transform duration-500 ${isSwapped ? 'rotate-180' : ''}`} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
                                </button>
                            </div>

                            {/* Buy Card */}
                            <div className={`squircle p-4 transition-all duration-500 ${isSwapped ? '-translate-y-[126px]' : 'translate-y-0'}`}>
                                <div className="text-sm font-medium text-zinc-500 mb-2">Buy</div>
                                <div className="flex justify-between items-center">
                                    <div className="text-4xl text-zinc-800 font-medium">0</div>
                                    <button className="bg-[#FC00BD] text-white px-5 py-2.5 rounded-2xl font-bold text-[15px] pink-glow hover:bg-[#E500AB] transition-all">Select token</button>
                                </div>
                                <div className="flex gap-2 mt-4 overflow-x-auto no-scrollbar">
                                    {[1,2,3,4].map(i => (
                                        <div key={i} className="w-8 h-8 rounded-full bg-[#1B1B1B] p-1.5 opacity-40 hover:opacity-100 cursor-pointer transition-opacity border border-white/5">
                                            <img src="https://app.uniswap.org/static/media/eth-logo.4054a323.png" />
                                        </div>
                                    ))}
                                    <div className="w-8 h-8 rounded-full bg-[#1B1B1B] border border-white/5 flex items-center justify-center text-[10px] text-zinc-500 font-bold">7+</div>
                                </div>
                            </div>

                            {/* CTA Button */}
                            <button className="w-full mt-3 bg-[#FC00BD1A] text-[#FC00BD] py-5 rounded-[24px] font-bold text-lg border border-[#FC00BD1A] hover:bg-[#FC00BD33] transition-all">Get started</button>
                        </div>

                        <p className="text-center text-[13px] text-zinc-500 mt-8 px-10 leading-relaxed">
                            Buy and sell crypto with <span className="text-[#FC00BD]">zero app fees</span> on 19+ networks including Ethereum, Unichain, and Base.
                        </p>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
