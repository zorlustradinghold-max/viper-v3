<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap | Multi-Token Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FC00BD; --bg: #0D0D0D; --card: #131313; --border: rgba(255,255,255,0.05); }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; margin: 0; }
        
        .squircle { border-radius: 24px; border: 1px solid var(--border); background: var(--card); transition: all 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #131313; border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 1000; max-height: 95vh; padding: 24px; overflow-y: auto; }
        .drawer-active { transform: translateY(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-blur: 10px; z-index: 900; display: none; opacity: 0; transition: opacity 0.3s; }
        
        .move-down { transform: translateY(124px); }
        .move-up { transform: translateY(-124px); }
        
        .row-item { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .row-item:active { background: rgba(255,255,255,0.08); transform: scale(0.98); }

        .btn-pink { background: var(--pink); border-radius: 20px; font-weight: 700; width: 100%; padding: 16px; margin-top: 12px; box-shadow: 0 4px 20px rgba(252, 0, 189, 0.2); }
        .btn-pink:active { transform: scale(0.97); }

        .search-box { background: #0D0D0D; border: 1px solid var(--border); border-radius: 20px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; color: white; font-size: 16px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- HEADER -->
    <nav class="w-full max-w-[480px] flex justify-between items-center p-4">
        <div class="flex items-center gap-4">
            <!-- ACTUAL UNISWAP LOGO -->
            <svg width="34" height="34" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M38.86 19.34C36.42 16.9 31.94 13.78 26.54 12.02C23.06 10.9 19.18 10.3 15.5 10.3C13.58 10.3 11.78 10.42 10.1 10.74C10.1 10.74 8.78 10.98 8.42 11.3C8.06 11.62 8.3 12.98 8.3 12.98C8.62 14.66 8.74 16.46 8.74 18.38C8.74 22.06 8.14 25.94 7.02 29.42C5.26 34.82 2.14 39.3 0 41.74L6.26 48C11.18 43.08 17.18 36.62 20.34 30.22C23.5 36.62 29.5 43.08 34.42 48L40.68 41.74C38.54 39.3 35.42 34.82 33.66 29.42C32.54 25.94 31.94 22.06 31.94 18.38C31.94 16.46 32.06 14.66 32.38 12.98L38.86 19.34Z" fill="#FC00BD"/>
            </svg>
            <svg onclick="openD('app-menu')" class="cursor-pointer text-zinc-500 hover:text-white transition-colors" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
        <div class="flex items-center gap-3">
            <svg onclick="openD('search-drawer')" class="nav-icon" width="20" height="20" fill="none" stroke="#9B9B9B" stroke-width="2.5" class="cursor-pointer hover:stroke-white"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <button onclick="openD('wallet-menu')" class="bg-[#FC00BD1A] text-[#FC00BD] px-4 py-1.5 rounded-2xl font-bold text-sm">Connect</button>
        </div>
    </nav>

    <!-- SWAP ENGINE -->
    <main class="w-full max-w-[480px] px-4 mt-12">
        <h1 class="text-[34px] font-medium tracking-tighter leading-tight mb-10">Swap anytime,<br>anywhere.</h1>

        <div class="relative flex flex-col gap-1" id="engine">
            <!-- SELL SECTION -->
            <div id="sell" class="squircle p-4 z-10 transition-transform duration-500">
                <div class="flex justify-between text-sm font-medium text-zinc-500 mb-2"><span>Sell</span><span id="bal-s">Balance: 1.24</span></div>
                <div class="flex justify-between items-center">
                    <input type="number" id="sIn" placeholder="0" class="bg-transparent text-4xl outline-none w-full font-medium placeholder-zinc-800 text-white">
                    <button onclick="openD('token-menu', 'sell')" class="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full active:scale-95 transition-all">
                        <img id="img-s" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span id="sym-s" class="font-bold">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="fiat-s" class="text-sm text-zinc-600 mt-1 font-medium tracking-tight">$0</div>
            </div>

            <!-- SWAP TOGGLE -->
            <div class="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                <button onclick="flip()" class="bg-[#131313] p-3 rounded-2xl border-[6px] border-[#0D0D0D] active:scale-90 transition-transform shadow-2xl">
                    <svg id="arr" class="text-zinc-500 transition-transform duration-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"></path></svg>
                </button>
            </div>

            <!-- BUY SECTION -->
            <div id="buy" class="squircle p-4 transition-transform duration-500">
                <div class="text-sm font-medium text-zinc-500 mb-2">Buy</div>
                <div class="flex justify-between items-center">
                    <div id="bVal" class="text-4xl text-zinc-800 font-medium">0</div>
                    <button id="bBtn" onclick="openD('token-menu', 'buy')" class="bg-[#FC00BD] text-white px-5 py-2.5 rounded-2xl font-bold text-[15px] active:scale-95 transition-all">Select token</button>
                </div>
            </div>
            
            <button class="btn-pink">Get started</button>
        </div>
    </main>

    <!-- DRAWERS -->
    <div id="overlay" onclick="closeAll()" class="overlay"></div>

    <div id="token-menu" class="drawer">
        <h2 class="font-bold text-xl mb-6">Select a token</h2>
        <div class="search-box"><input type="text" id="tSearch" placeholder="Search name or address" oninput="doSearchT()"></div>
        <div id="tList" class="flex flex-col gap-1"></div>
    </div>

    <script>
        const tokens = [
            { s: 'ETH', n: 'Ether', p: 3250.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png' },
            { s: 'USDC', n: 'USD Coin', p: 1.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' },
            { s: 'USDT', n: 'Tether', p: 1.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
            { s: 'WBTC', n: 'Wrapped BTC', p: 64100.00, img: 'https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599/logo.png' }
        ];

        let target = 'sell';
        let selSell = tokens[0];
        let selBuy = null;

        function doSearchT() {
            const q = document.getElementById('tSearch').value.toLowerCase();
            const l = document.getElementById('tList');
            l.innerHTML = '';
            tokens.filter(x => x.s.toLowerCase().includes(q) || x.n.toLowerCase().includes(q)).forEach(t => {
                l.innerHTML += `<div onclick="setT('${t.s}')" class="row-item"><img src="${t.img}" class="w-10 h-10 rounded-full"><div><p class="font-bold">${t.n}</p><p class="text-xs text-zinc-500">${t.s}</p></div></div>`;
            });
        }

        // DYNAMIC PRICE ENGINE: WORKS FOR ALL TOKENS
        document.getElementById('sIn').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            const fiat = document.getElementById('fiat-s');
            const bVal = document.getElementById('bVal');
            
            if(v > 0) {
                fiat.innerText = '$' + (v * selSell.p).toLocaleString();
                if(selBuy) {
                    const res = (v * selSell.p) / selBuy.p;
                    bVal.innerText = res.toLocaleString(undefined, {maximumFractionDigits: 6});
                    bVal.style.color = 'white';
                }
            } else {
                fiat.innerText = '$0';
                bVal.innerText = '0';
                bVal.style.color = '#27272a';
            }
        });

        function setT(s) {
            const t = tokens.find(x => x.s === s);
            if(target === 'sell') {
                selSell = t;
                document.getElementById('sym-s').innerText = t.s;
                document.getElementById('img-s').src = t.img;
            } else {
                selBuy = t;
                document.getElementById('bBtn').innerHTML = `<img src="${t.img}" class="w-6 h-6 rounded-full"><span class="font-bold">${t.s}</span>`;
                document.getElementById('bBtn').className = "bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full";
            }
            closeAll();
            document.getElementById('sIn').dispatchEvent(new Event('input')); // Recalculate
        }

        function openD(id, t = 'sell') {
            target = t;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '1';
                document.getElementById(id).classList.add('drawer-active');
                if(id === 'token-menu') doSearchT();
            }, 10);
        }

        function flip() {
            document.getElementById('sell').classList.toggle('move-down');
            document.getElementById('buy').classList.toggle('move-up');
            document.getElementById('arr').style.transform = document.getElementById('arr').style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function closeAll() {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('drawer-active'));
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        doSearchT();
    </script>
</body>
</html>
