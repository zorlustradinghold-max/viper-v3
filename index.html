<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Uniswap | 1:1 Functional</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff007a; --bg: #000000; --surface: #131313; --input: #1b1b1b;
            --border: #222222; --text: #ffffff; --subtext: #9b9b9b;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header { width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #191919; position: sticky; top: 0; z-index: 100; }
        .nav-links { display: flex; background: #131313; padding: 4px; border-radius: 16px; border: 1px solid #222; }
        .nav-links span { padding: 6px 16px; border-radius: 12px; cursor: pointer; color: var(--subtext); font-weight: 500; }
        .nav-links span.active { color: var(--text); background: #1b1b1b; }

        .swap-card { margin-top: 80px; background: var(--surface); border-radius: 24px; padding: 8px; border: 1px solid var(--border); width: 100%; max-width: 480px; }
        .input-box { background: var(--input); border-radius: 16px; padding: 16px; margin: 4px 0; }
        .box-row { display: flex; justify-content: space-between; align-items: center; }
        input { background: none; border: none; color: white; font-size: 36px; width: 50%; outline: none; }
        
        /* THE TOKEN PILL */
        .token-pill { background: #000; padding: 6px 12px; border-radius: 18px; display: flex; align-items: center; gap: 8px; font-weight: 700; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .token-pill:hover { border-color: #444; }
        .token-pill img { width: 24px; height: 24px; border-radius: 50%; }

        /* MODAL 1:1 STYLING */
        #token-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--surface); width: 100%; max-width: 420px; border-radius: 24px; border: 1px solid var(--border); padding: 20px; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .search-bar { width: 100%; background: var(--input); border: 1px solid var(--border); padding: 16px; border-radius: 16px; color: white; margin: 16px 0; outline: none; }
        .search-bar:focus { border-color: var(--pink); }
        
        .token-list { max-height: 300px; overflow-y: auto; }
        .token-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .token-item:hover { background: var(--input); }
        .token-item img { width: 32px; height: 32px; border-radius: 50%; }

        .btn-main { width: 100%; background: #22121b; color: var(--pink); border: none; padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 600; margin-top: 10px; cursor: pointer; }

        .close-btn { float: right; cursor: pointer; color: var(--subtext); font-size: 20px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;"><img src="https://app.uniswap.org/favicon.png" width="28"></div>
    <div class="nav-links"><span class="active">Swap</span><span>Tokens</span><span>NFTs</span></div>
    <button style="background:#191919; color:white; border:none; padding:8px 16px; border-radius:18px; font-weight:600;">Connect</button>
</header>

<div class="swap-card">
    <div class="input-box">
        <div style="font-size:14px; color:var(--subtext); margin-bottom:8px;">Sell</div>
        <div class="box-row">
            <input type="number" id="amtIn" placeholder="0" oninput="calculate()">
            <div class="token-pill" id="sell-token-pill" onclick="openTokenModal('sell')">
                <img id="sell-icon" src="https://tokens.1inch.io/0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee.png">
                <span id="sell-symbol">ETH</span>
            </div>
        </div>
    </div>

    <div style="text-align:center; margin:-15px 0; color:var(--subtext); z-index:10; position:relative;">↓</div>

    <div class="input-box">
        <div style="font-size:14px; color:var(--subtext); margin-bottom:8px;">Buy</div>
        <div class="box-row">
            <input type="number" id="amtOut" placeholder="0" readonly>
            <div class="token-pill" id="buy-token-pill" onclick="openTokenModal('buy')" style="background: var(--pink); border:none;">
                <img id="buy-icon" src="https://tokens.1inch.io/0xdac17f958d2ee523a2206206994597c13d831ec7.png">
                <span id="buy-symbol" style="color:white">USDT</span>
            </div>
        </div>
    </div>
    <button class="btn-main" onclick="alert('Connect Wallet First')">Get started</button>
</div>

<!-- TOKEN SELECTION MODAL -->
<div id="token-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <h3 style="margin:0">Select a token</h3>
        <input type="text" class="search-bar" placeholder="Search name or paste address" id="tokenSearch">
        <div class="token-list" id="tokenList">
            <!-- Tokens injected by JS -->
        </div>
    </div>
</div>

<script>
    const tokens = [
        { name: 'Ethereum', symbol: 'ETH', icon: 'https://tokens.1inch.io/0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee.png', address: '0xeeee...' },
        { name: 'Tether', symbol: 'USDT', icon: 'https://tokens.1inch.io/0xdac17f958d2ee523a2206206994597c13d831ec7.png', address: '0xdac1...' },
        { name: 'USD Coin', symbol: 'USDC', icon: 'https://tokens.1inch.io/0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48.png', address: '0xa0b8...' },
        { name: 'Wrapped BTC', symbol: 'WBTC', icon: 'https://tokens.1inch.io/0x2260fac5e5542a773aa44fbcfedf7c193bc2c599.png', address: '0x2260...' },
        { name: 'Uniswap', symbol: 'UNI', icon: 'https://tokens.1inch.io/0x1f9840a85af5bf1d1762f925bdaddc4201f984.png', address: '0x1f98...' }
    ];

    let activeTarget = 'sell';

    function openTokenModal(target) {
        activeTarget = target;
        const list = document.getElementById('tokenList');
        list.innerHTML = '';
        tokens.forEach(token => {
            const div = document.createElement('div');
            div.className = 'token-item';
            div.innerHTML = `<img src="${token.icon}"> <div><b>${token.symbol}</b><br><small style="color:gray">${token.name}</small></div>`;
            div.onclick = () => selectToken(token);
            list.appendChild(div);
        });
        document.getElementById('token-modal').style.display = 'flex';
    }

    function selectToken(token) {
        document.getElementById(`${activeTarget}-symbol`).innerText = token.symbol;
        document.getElementById(`${activeTarget}-icon`).src = token.icon;
        closeModal();
    }

    function closeModal() {
        document.getElementById('token-modal').style.display = 'none';
    }

    // Basic Mock Quote
    function calculate() {
        const val = document.getElementById('amtIn').value;
        if(val > 0) document.getElementById('amtOut').value = (val * 2450).toFixed(2);
        else document.getElementById('amtOut').value = '';
    }
</script>

</body>
</html>
