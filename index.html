<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniswap | Verified Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FC00BD; --bg: #0D0D0D; --card: #131313; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .squircle { border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background: var(--card); transition: all 0.4s cubic-bezier(0.15, 0, 0.15, 1); }
        .swap-arrow { background: var(--card); border: 4px solid var(--bg); border-radius: 12px; z-index: 30; transition: all 0.2s ease; }
        .btn-pink { background: var(--pink); border-radius: 18px; font-weight: 700; transition: all 0.1s ease; box-shadow: 0 4px 12px rgba(252, 0, 189, 0.2); }
        .move-top { transform: translateY(126px); }
        .move-bot { transform: translateY(-126px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <nav class="w-full max-w-[480px] flex justify-between items-center p-4">
        <!-- VERIFIED UNISWAP LOGO -->
        <img src="https://raw.githubusercontent.com/Uniswap/brand-assets/main/Uniswap_Icon.svg" class="w-8 h-8" alt="Uniswap">
        <button class="bg-[#FC00BD1A] text-[#FC00BD] border border-[#FC00BD33] px-4 py-1.5 rounded-2xl font-bold text-sm hover:bg-[#FC00BD33] transition-all">Connect</button>
    </nav>

    <main class="w-full max-w-[480px] px-4 mt-12">
        <h1 class="text-[34px] font-medium tracking-tighter leading-tight mb-8">Swap anytime,<br>anywhere.</h1>

        <div class="relative flex flex-col gap-1">
            
            <!-- SELL CARD -->
            <div id="sell" class="squircle p-4 z-10">
                <div class="text-sm font-medium text-zinc-500 mb-2 font-semibold">Sell</div>
                <div class="flex justify-between items-center">
                    <input type="number" id="sInput" placeholder="0" class="bg-transparent text-4xl outline-none w-full font-medium placeholder-zinc-800">
                    <button class="bg-[#1B1B1B] border border-white/5 flex items-center gap-2 p-1.5 pr-3 rounded-full hover:bg-zinc-800 transition-all">
                        <!-- VERIFIED ETH LOGO -->
                        <img src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2/logo.png" class="w-6 h-6 rounded-full">
                        <span class="font-bold text-[15px]">ETH</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9B9B9B" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
                <div id="sPrice" class="text-sm text-zinc-600 mt-1 font-medium tracking-tight">$0</div>
            </div>

            <!-- SWAP TOGGLE -->
            <div class="absolute left-1/2 top-[124px] -translate-x-1/2 -translate-y-1/2 z-20">
                <button onclick="runSwap()" class="swap-arrow p-2.5 active:scale-90 hover:scale-110">
                    <svg id="arrow" class="text-zinc-500 transition-transform duration-500" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"></path></svg>
                </button>
            </div>

            <!-- BUY CARD -->
            <div id="buy" class="squircle p-4">
                <div class="text-sm font-medium text-zinc-500 mb-2 font-semibold">Buy</div>
                <div class="flex justify-between items-center">
                    <div id="bValue" class="text-4xl text-zinc-800 font-medium">0</div>
                    <button class="btn-pink text-white px-5 py-2.5 text-[15px] hover:brightness-110 active:scale-95 transition-all">Select token</button>
                </div>
                <!-- QUICK LIST WITH VERIFIED LOGOS -->
                <div class="flex gap-2 mt-4">
                    <!-- USDC -->
                    <img class="w-8 h-8 rounded-full border border-white/5 p-1 opacity-50 hover:opacity-100 cursor-pointer" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png">
                    <!-- USDT -->
                    <img class="w-8 h-8 rounded-full border border-white/5 p-1 opacity-50 hover:opacity-100 cursor-pointer" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png">
                    <!-- WBTC -->
                    <img class="w-8 h-8 rounded-full border border-white/5 p-1 opacity-50 hover:opacity-100 cursor-pointer" src="https://raw.githubusercontent.com/Uniswap/assets/master/blockchains/ethereum/assets/0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599/logo.png">
                    <div class="w-8 h-8 rounded-full bg-zinc-800 border border-white/5 flex items-center justify-center text-[10px] text-zinc-500 font-bold">19+</div>
                </div>
            </div>

            <!-- START BUTTON -->
            <button class="w-full mt-3 bg-[#FC00BD1A] text-[#FC00BD] py-5 rounded-[24px] font-bold text-lg border border-[#FC00BD1A] hover:bg-[#FC00BD33] active:scale-[0.98] transition-all">Get started</button>
        </div>

        <p class="text-center text-[13px] text-zinc-500 mt-8 px-10 leading-relaxed font-medium">
            Buy and sell crypto with <span class="text-[#FC00BD]">zero app fees</span> on 19+ networks including Ethereum, Unichain, and Base.
        </p>
    </main>

    <script>
        const ethPrice = 2450.00;
        const sInput = document.getElementById('sInput');
        const sPrice = document.getElementById('sPrice');
        const bValue = document.getElementById('bValue');

        sInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if(val > 0) {
                sPrice.innerText = '$' + (val * ethPrice).toLocaleString(undefined, {minimumFractionDigits: 2});
                bValue.innerText = (val * 2445.10).toLocaleString(undefined, {maximumFractionDigits: 2}); // Simulated Rate
                bValue.classList.remove('text-zinc-800');
                bValue.classList.add('text-white');
            } else {
                sPrice.innerText = '$0';
                bValue.innerText = '0';
                bValue.classList.add('text-zinc-800');
                bValue.classList.remove('text-white');
            }
        });

        let isSwapped = false;
        function runSwap() {
            isSwapped = !isSwapped;
            document.getElementById('sell').classList.toggle('move-top');
            document.getElementById('buy').classList.toggle('move-bot');
            document.getElementById('arrow').style.transform = isSwapped ? 'rotate(180deg)' : 'rotate(0deg)';
        }
    </script>
</body>
</html>
